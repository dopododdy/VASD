<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ตั้งค่าระบบคิว – VASD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --navy:       #0b1929;
  --teal:       #0ea5a0;
  --teal-light: #14c4bc;
  --teal-glow:  rgba(14,165,160,0.25);
  --primary:    #3b82f6;
  --primary-light: #60a5fa;
  --violet:     #8b5cf6;
  --emerald:    #10b981;
  --amber:      #f59e0b;
  --rose:       #ef4444;

  --surface:    rgba(255,255,255,0.04);
  --surface-2:  rgba(255,255,255,0.07);
  --surface-3:  rgba(255,255,255,0.11);
  --border:     rgba(255,255,255,0.10);
  --text:       #e2e8f0;
  --text-dim:   #94a3b8;
  --text-faint: #475569;

  --radius:    14px;
  --radius-lg: 20px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Sarabun", sans-serif;
  background: var(--navy); color: var(--text);
  min-height: 100vh;
}
body::before {
  content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(139,92,246,0.10) 0%, transparent 70%);
}

header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(11,25,41,0.92); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 16px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--violet), #a78bfa);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; box-shadow: 0 0 20px rgba(139,92,246,0.4);
}
.brand-name { font-family: "Outfit", sans-serif; font-size: 15px; font-weight: 800; color: #fff; }
.btn-back {
  background: var(--surface-2); color: var(--text);
  border: 1px solid var(--border);
  padding: 8px 14px; border-radius: 10px;
  font-family: "Sarabun", sans-serif; font-size: 13px;
  font-weight: 700; cursor: pointer;
  text-decoration: none; display: flex; align-items: center; gap: 6px;
}

.wrap {
  position: relative; z-index: 1;
  max-width: 720px; margin: 0 auto;
  padding: 20px 14px 80px; width: 100%;
  display: flex; flex-direction: column; gap: 16px;
}

.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.section-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  background: var(--surface-2);
}
.section-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.section-title { font-size: 14px; font-weight: 700; color: #fff; flex: 1; }
.section-body { padding: 16px 18px; }

/* ── Queue Management ── */
.btn-add-queue {
  width: 100%;
  background: linear-gradient(135deg, var(--teal), var(--teal-light));
  color: #fff; border: none;
  padding: 14px; border-radius: 12px;
  font-family: "Sarabun", sans-serif; font-size: 15px;
  font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 6px 18px var(--teal-glow);
  margin-bottom: 12px;
  transition: 0.2s;
}
.btn-add-queue:hover { transform: translateY(-2px); }
.btn-add-queue:active { transform: scale(0.98); }

.queue-list { display: flex; flex-direction: column; gap: 6px; max-height: 400px; overflow-y: auto; }
.queue-list::-webkit-scrollbar { width: 6px; }
.queue-list::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }

.queue-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  padding: 10px 12px;
  border-radius: 10px;
  transition: 0.2s;
}
.queue-row:hover { background: var(--surface-3); }
.queue-row-num {
  font-family: "Outfit", sans-serif;
  font-weight: 900;
  font-size: 24px;
  background: linear-gradient(135deg, var(--teal-light), var(--teal));
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  flex-shrink: 0;
  min-width: 36px; text-align: center;
}
.queue-row-info { flex: 1; min-width: 0; }
.queue-row-name {
  font-family: "Outfit", sans-serif;
  font-weight: 700; color: #fff;
  font-size: 14px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.queue-row-meta {
  font-size: 11px; color: var(--text-dim);
  margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.queue-row-actions { display: flex; gap: 6px; flex-shrink: 0; }
.btn-icon {
  background: var(--surface-3); color: var(--text);
  border: 1px solid var(--border);
  width: 34px; height: 34px;
  border-radius: 8px; font-size: 14px;
  cursor: pointer; transition: 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { transform: scale(1.05); }
.btn-icon.edit:hover  { background: rgba(59,130,246,0.2); color: var(--primary-light); border-color: var(--primary); }
.btn-icon.del:hover   { background: rgba(239,68,68,0.2);  color: #fca5a5;             border-color: var(--rose); }

.queue-empty {
  text-align: center; padding: 30px 20px;
  color: var(--text-faint); font-size: 13px;
}

/* ── Rooms / Voice (existing) ── */
.field-group { margin-bottom: 12px; }
.field-group:last-child { margin-bottom: 0; }
.field-label {
  font-size: 12px; font-weight: 600;
  color: var(--text-dim);
  margin-bottom: 6px; display: block;
}
.field-value-pill {
  display: inline-block;
  background: var(--surface-3);
  padding: 2px 8px; border-radius: 8px;
  font-family: "Outfit", sans-serif; font-size: 12px;
  margin-left: 6px;
}

input[type="text"], input[type="number"], select {
  width: 100%; padding: 10px 12px;
  font-size: 14px; font-family: "Sarabun", sans-serif;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text); outline: none; transition: 0.2s;
}
input:focus, select:focus { border-color: var(--violet); box-shadow: 0 0 0 3px rgba(139,92,246,0.15); }

input[type="range"] { width: 100%; accent-color: var(--violet); cursor: pointer; }

.room-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.room-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface-2);
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
}
.room-row-num {
  font-family: "Outfit", sans-serif;
  font-weight: 800; color: var(--violet);
  width: 24px; flex-shrink: 0;
}
.room-row input {
  flex: 1; padding: 6px 10px; font-size: 13px;
  background: rgba(0,0,0,0.2); border: 1px solid var(--border);
  border-radius: 8px;
}
.room-row .btn-del {
  background: rgba(239,68,68,0.15); color: var(--rose);
  border: 1px solid rgba(239,68,68,0.3);
  padding: 5px 10px; border-radius: 8px;
  font-size: 12px; cursor: pointer; font-family: inherit;
}
.btn-add {
  width: 100%;
  background: var(--surface-3); color: var(--text);
  border: 1px dashed var(--border); border-radius: 10px;
  padding: 10px; font-family: inherit; font-size: 13px;
  cursor: pointer; font-weight: 600;
}
.btn-add:hover { background: rgba(139,92,246,0.1); border-color: rgba(139,92,246,0.4); color: #fff; }

.btn-row { display: flex; gap: 10px; }
.btn {
  padding: 12px 16px; font-size: 14px; font-weight: 700;
  font-family: "Sarabun", sans-serif;
  border: none; border-radius: 10px; cursor: pointer;
  flex: 1; transition: 0.2s;
}
.btn:active { transform: scale(0.98); }
.btn-test {
  background: linear-gradient(135deg, var(--teal), var(--teal-light));
  color: #fff;
  box-shadow: 0 4px 12px var(--teal-glow);
}
.btn-save {
  background: linear-gradient(135deg, var(--emerald), #34d399);
  color: #fff;
  box-shadow: 0 4px 12px rgba(16,185,129,0.3);
  font-size: 15px;
}
.btn-reset {
  background: var(--surface-3); color: var(--text-dim);
  border: 1px solid var(--border);
}

.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translate(-50%, 100px);
  background: var(--emerald); color: #fff;
  padding: 12px 20px; border-radius: 12px;
  font-weight: 700;
  box-shadow: 0 10px 30px rgba(16,185,129,0.4);
  opacity: 0; transition: all 0.3s ease;
  z-index: 999;
}
.toast.show { opacity: 1; transform: translate(-50%, 0); }
.toast.error { background: var(--rose); box-shadow: 0 10px 30px rgba(239,68,68,0.4); }

.hint { font-size: 11px; color: var(--text-faint); margin-top: 4px; }
.no-voice { color: var(--amber); font-size: 12px; padding: 8px; background: rgba(245,158,11,0.1); border-radius: 8px; }

/* ── Modal: Queue Form ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 800;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
  display: none;
  align-items: center; justify-content: center;
  padding: 16px;
}
.modal-overlay.show { display: flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-box {
  background: var(--navy);
  border: 2px solid var(--teal);
  border-radius: 20px;
  max-width: 460px; width: 100%;
  max-height: 90vh; overflow-y: auto;
  padding: 22px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  animation: modalIn 0.3s ease;
}
@keyframes modalIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-title {
  font-family: "Outfit", sans-serif;
  font-size: 20px; font-weight: 800; color: #fff;
  margin-bottom: 4px;
}
.modal-subtitle { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; }

.radio-group { display: flex; gap: 8px; }
.radio-btn {
  flex: 1; cursor: pointer;
  display: block;
}
.radio-btn input { display: none; }
.radio-btn span {
  display: block; text-align: center;
  padding: 10px; border-radius: 10px;
  background: var(--surface-2);
  border: 2px solid var(--border);
  font-weight: 600; transition: 0.2s;
}
.radio-btn input:checked + span {
  background: rgba(14,165,160,0.2);
  border-color: var(--teal-light); color: #fff;
}

.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-btn {
  flex: 1; padding: 12px;
  font-family: "Sarabun", sans-serif; font-size: 14px;
  font-weight: 700; border: none; border-radius: 10px;
  cursor: pointer; transition: 0.2s;
}
.modal-btn:active { transform: scale(0.98); }
.modal-btn.cancel { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
.modal-btn.save { background: linear-gradient(135deg, var(--emerald), #34d399); color: #fff; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
.modal-btn.delete-confirm { background: linear-gradient(135deg, var(--rose), #dc2626); color: #fff; box-shadow: 0 4px 12px rgba(239,68,68,0.3); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo">⚙️</div>
    <div class="brand-name">ตั้งค่าระบบเรียกคิว</div>
  </div>
  <a href="q.html" class="btn-back">← กลับหน้าคิว</a>
</header>

<div class="wrap">

  <!-- ★ Queue Management (NEW) -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon" style="background: var(--teal);">🎫</div>
      <div class="section-title">จัดการคิว <span style="color:var(--text-dim); font-weight:500;">(สถานะ: รอตรวจ)</span></div>
    </div>
    <div class="section-body">
      <button class="btn-add-queue" onclick="openQueueForm()">➕ เพิ่มคิวใหม่</button>
      <div id="queueList" class="queue-list">
        <div class="queue-empty">กำลังโหลด...</div>
      </div>
    </div>
  </div>

  <!-- Rooms -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon" style="background: var(--primary);">🏥</div>
      <div class="section-title">ห้องตรวจ</div>
    </div>
    <div class="section-body">
      <div id="roomList" class="room-list"></div>
      <button class="btn-add" onclick="addRoom()">➕ เพิ่มห้องตรวจ</button>
      <div class="hint">ลำดับห้องในรายการ = ลำดับปุ่มในหน้าเรียกคิว</div>
    </div>
  </div>

  <!-- Voice -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon" style="background: var(--teal-light);">🔊</div>
      <div class="section-title">เสียงเรียก</div>
    </div>
    <div class="section-body">
      <div class="field-group">
        <label class="field-label">เลือกเสียง (ภาษาไทย)</label>
        <select id="voiceSelect"></select>
        <div id="voiceWarn" class="hint" style="display:none;"></div>
      </div>
      <div class="field-group">
        <label class="field-label">ความเร็วเสียง <span class="field-value-pill" id="rateVal">1.0×</span></label>
        <input type="range" id="rateSlider" min="0.5" max="2.0" step="0.05" value="1.0">
        <div class="hint">0.5× = ช้ามาก · 1.0× = ปกติ · 2.0× = เร็วมาก</div>
      </div>
      <div class="field-group">
        <label class="field-label">ระดับเสียง (Pitch) <span class="field-value-pill" id="pitchVal">1.0</span></label>
        <input type="range" id="pitchSlider" min="0.5" max="2.0" step="0.05" value="1.0">
      </div>
      <div class="field-group">
        <label class="field-label">จำนวนครั้งที่พูดซ้ำ</label>
        <select id="repeatSelect">
          <option value="1">พูด 1 ครั้ง</option>
          <option value="2" selected>พูดซ้ำ 2 ครั้ง</option>
          <option value="3">พูดซ้ำ 3 ครั้ง</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn btn-test" onclick="testVoice()">🔊 ทดสอบเสียง</button>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-reset" onclick="resetDefaults()">↺ คืนค่าเริ่มต้น</button>
    <button class="btn btn-save" onclick="saveSettings()">💾 บันทึก</button>
  </div>

</div>

<!-- ── Queue Form Modal (Add / Edit) ── -->
<div class="modal-overlay" id="queueModal" onclick="closeQueueForm(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title" id="qFormTitle">เพิ่มคิวใหม่</div>
    <div class="modal-subtitle" id="qFormSubtitle">กรอกข้อมูลด้านล่าง</div>

    <div class="field-group">
      <label class="field-label">หมายเลขคิว</label>
      <input type="number" id="qFormNumber" min="1" step="1">
      <div class="hint" id="qFormNumberHint">เว้นว่างเพื่อใช้เลขถัดไปอัตโนมัติ</div>
    </div>

    <div class="field-group">
      <label class="field-label">ชื่อสัตว์ *</label>
      <input type="text" id="qFormAnimal" placeholder="ชื่อสัตว์เลี้ยง">
    </div>

    <div class="field-group">
      <label class="field-label">ชนิด</label>
      <div class="radio-group">
        <label class="radio-btn"><input type="radio" name="qSpecies" value="ม" checked><span>🐱 แมว</span></label>
        <label class="radio-btn"><input type="radio" name="qSpecies" value="ส"><span>🐶 สุนัข</span></label>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">เพศ</label>
      <div class="radio-group">
        <label class="radio-btn"><input type="radio" name="qSex" value="เมีย" checked><span>♀ เมีย</span></label>
        <label class="radio-btn"><input type="radio" name="qSex" value="ผู้"><span>♂ ผู้</span></label>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">ชื่อเจ้าของ</label>
      <input type="text" id="qFormOwner" placeholder="ชื่อ-นามสกุล (ถ้ามี)">
    </div>

    <div class="field-group" id="qFormStatusGroup" style="display:none;">
      <label class="field-label">สถานะ</label>
      <select id="qFormStatus">
        <option value="waiting">รอตรวจ</option>
        <option value="anesthesia">วางยา</option>
        <option value="surgery">ผ่าตัด</option>
        <option value="recovery">พักฟื้น</option>
        <option value="ready_to_go_home">พร้อมกลับบ้าน</option>
        <option value="done">เสร็จสิ้น</option>
        <option value="cancel">ยกเลิก</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeQueueForm()">ยกเลิก</button>
      <button class="modal-btn save" id="qFormSubmit" onclick="submitQueueForm()">💾 บันทึก</button>
    </div>
  </div>
</div>

<!-- ── Delete Confirm Modal ── -->
<div class="modal-overlay" id="deleteModal" onclick="closeDeleteModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()" style="max-width:380px; text-align:center;">
    <div style="font-size:48px; margin-bottom:8px;">⚠️</div>
    <div class="modal-title">ลบคิว?</div>
    <div class="modal-subtitle" id="delModalText">คิวที่ถูกลบจะไม่สามารถกู้คืนได้</div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeDeleteModal()">ยกเลิก</button>
      <button class="modal-btn delete-confirm" onclick="confirmDelete()">🗑️ ลบคิว</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { supabase } from "./js/supabase.js";

// ─────────────────────────────────────────────
// Defaults
// ─────────────────────────────────────────────
const DEFAULT_ROOMS = ['ห้องตรวจ 1', 'ห้องตรวจ 2'];
const DEFAULT_RATE = 1.0;
const DEFAULT_PITCH = 1.0;
const DEFAULT_REPEAT = 2;

let allVoices = [];
let currentQueues = [];   // cache สำหรับ edit
let editingQueueId = null;   // null = add mode, else = edit mode
let pendingDeleteId = null;

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(text, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function speciesIcon(s) {
  if (s === 'ส') return '🐶';
  if (s === 'ม') return '🐱';
  return '🐾';
}

// ─────────────────────────────────────────────
// Load settings
// ─────────────────────────────────────────────
function loadSettings() {
  const rooms = JSON.parse(localStorage.getItem('q_rooms') || JSON.stringify(DEFAULT_ROOMS));
  renderRooms(rooms);

  const rate = parseFloat(localStorage.getItem('q_speech_rate') || DEFAULT_RATE);
  const pitch = parseFloat(localStorage.getItem('q_speech_pitch') || DEFAULT_PITCH);
  document.getElementById('rateSlider').value = rate;
  document.getElementById('pitchSlider').value = pitch;
  document.getElementById('rateVal').textContent = rate.toFixed(2) + '×';
  document.getElementById('pitchVal').textContent = pitch.toFixed(2);

  const repeat = localStorage.getItem('q_repeat') || DEFAULT_REPEAT;
  document.getElementById('repeatSelect').value = repeat;
}

document.getElementById('rateSlider').oninput = e => {
  document.getElementById('rateVal').textContent = parseFloat(e.target.value).toFixed(2) + '×';
};
document.getElementById('pitchSlider').oninput = e => {
  document.getElementById('pitchVal').textContent = parseFloat(e.target.value).toFixed(2);
};

// ─────────────────────────────────────────────
// Rooms
// ─────────────────────────────────────────────
function renderRooms(rooms) {
  const list = document.getElementById('roomList');
  list.innerHTML = rooms.map((r, i) => `
    <div class="room-row">
      <span class="room-row-num">${i + 1}</span>
      <input type="text" value="${escapeHtml(r)}" placeholder="ชื่อห้องตรวจ">
      <button class="btn-del" onclick="removeRoom(${i})">✖</button>
    </div>
  `).join('');
}
function getCurrentRooms() {
  return Array.from(document.querySelectorAll('#roomList .room-row input'))
    .map(i => i.value.trim()).filter(v => v);
}
window.addRoom = function() {
  const rooms = getCurrentRooms();
  rooms.push(`ห้องตรวจ ${rooms.length + 1}`);
  renderRooms(rooms);
};
window.removeRoom = function(idx) {
  const rooms = getCurrentRooms();
  if (rooms.length <= 1) return alert('ต้องมีอย่างน้อย 1 ห้อง');
  rooms.splice(idx, 1);
  renderRooms(rooms);
};

// ─────────────────────────────────────────────
// Voices
// ─────────────────────────────────────────────
function loadVoices() {
  allVoices = speechSynthesis.getVoices();
  const thaiVoices = allVoices.filter(v => v.lang.startsWith('th') || /thai/i.test(v.name));
  const otherVoices = allVoices.filter(v => !thaiVoices.includes(v));

  const sel = document.getElementById('voiceSelect');
  const warn = document.getElementById('voiceWarn');

  if (thaiVoices.length === 0) {
    warn.style.display = 'block'; warn.className = 'no-voice';
    warn.textContent = '⚠️ ไม่พบเสียงภาษาไทย - แนะนำใช้ Chrome / Edge';
  } else {
    warn.style.display = 'none';
  }

  const labelGender = (name) => {
    if (/kanya|narisa|premwadee|google.*ภาษาไทย|female|woman/i.test(name)) return '♀';
    if (/pattara|male|man/i.test(name)) return '♂';
    return '';
  };

  const opts = [];
  if (thaiVoices.length > 0) {
    opts.push('<optgroup label="🇹🇭 เสียงภาษาไทย">');
    thaiVoices.forEach(v => {
      opts.push(`<option value="${escapeHtml(v.name)}">${escapeHtml(v.name)} ${labelGender(v.name)} (${v.lang})</option>`);
    });
    opts.push('</optgroup>');
  }
  if (otherVoices.length > 0) {
    opts.push('<optgroup label="เสียงอื่นๆ">');
    otherVoices.slice(0, 20).forEach(v => {
      opts.push(`<option value="${escapeHtml(v.name)}">${escapeHtml(v.name)} (${v.lang})</option>`);
    });
    opts.push('</optgroup>');
  }
  sel.innerHTML = opts.join('');

  const saved = localStorage.getItem('q_voice_name');
  if (saved && Array.from(sel.options).some(o => o.value === saved)) sel.value = saved;
}

if (speechSynthesis.getVoices().length > 0) loadVoices();
else speechSynthesis.onvoiceschanged = loadVoices;

// ─────────────────────────────────────────────
// Test voice — ตัวอย่าง: ลากเสียงเลข + เว้น 1 วินาที
// ─────────────────────────────────────────────
function numberToThai(n) {
  n = parseInt(n); if (isNaN(n)) return '';
  const d = ['ศูนย์','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'];
  if (n === 0) return d[0];
  if (n < 10) return d[n];
  if (n === 10) return 'สิบ';
  if (n < 20) return n === 11 ? 'สิบเอ็ด' : 'สิบ' + d[n - 10];
  if (n < 100) {
    const t = Math.floor(n/10), o = n%10;
    const tens = t === 2 ? 'ยี่สิบ' : d[t] + 'สิบ';
    if (o === 0) return tens;
    if (o === 1) return tens + 'เอ็ด';
    return tens + d[o];
  }
  if (n < 1000) {
    const h = Math.floor(n/100), r = n%100;
    return d[h] + 'ร้อย' + (r === 0 ? '' : numberToThai(r));
  }
  return String(n).split('').map(c => d[+c]).join(' ');
}

window.testVoice = function() {
  speechSynthesis.cancel();
  const rate = parseFloat(document.getElementById('rateSlider').value);
  const pitch = parseFloat(document.getElementById('pitchSlider').value);
  const voiceName = document.getElementById('voiceSelect').value;
  const voice = allVoices.find(v => v.name === voiceName);

  // ★ ประโยคเดียวต่อเนื่อง ฟังเป็นธรรมชาติ
  const text = `ขอเชิญคิวหมายเลข ${numberToThai(5)} คุณสมชาย เจ้าของน้องมะลิ เข้าห้องตรวจ ที่ หนึ่ง`;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'th-TH';
  u.rate = rate;
  u.pitch = pitch;
  if (voice) u.voice = voice;
  speechSynthesis.speak(u);
};

// ─────────────────────────────────────────────
// Save / Reset settings
// ─────────────────────────────────────────────
window.saveSettings = function() {
  const rooms = getCurrentRooms();
  if (rooms.length === 0) return alert('ต้องมีอย่างน้อย 1 ห้อง');
  localStorage.setItem('q_rooms', JSON.stringify(rooms));
  localStorage.setItem('q_speech_rate', document.getElementById('rateSlider').value);
  localStorage.setItem('q_speech_pitch', document.getElementById('pitchSlider').value);
  localStorage.setItem('q_voice_name', document.getElementById('voiceSelect').value);
  localStorage.setItem('q_repeat', document.getElementById('repeatSelect').value);
  showToast('✅ บันทึกการตั้งค่าเรียบร้อย');
};
window.resetDefaults = function() {
  if (!confirm('คืนค่าทั้งหมดเป็นค่าเริ่มต้น?')) return;
  ['q_rooms','q_speech_rate','q_speech_pitch','q_voice_name','q_repeat']
    .forEach(k => localStorage.removeItem(k));
  loadSettings();
  showToast('↺ คืนค่าเริ่มต้นแล้ว');
};

// ═══════════════════════════════════════════
// ★ QUEUE MANAGEMENT
// ═══════════════════════════════════════════
async function loadQueueList() {
  const list = document.getElementById('queueList');
  try {
    const { data, error } = await supabase
      .from('vasd_queue')
      .select(`
        id, animal_id, status,
        vasd_animal(id, queue_number, animal_name, species, sex, event_id, owner_id,
          vasd_owner(id, owner_name))
      `)
      .eq('status', 'waiting');

    if (error) throw error;

    currentQueues = (data || [])
      .filter(q => q.vasd_animal)
      .sort((a, b) => (a.vasd_animal.queue_number || 999) - (b.vasd_animal.queue_number || 999));

    if (currentQueues.length === 0) {
      list.innerHTML = `<div class="queue-empty">— ยังไม่มีคิวรอตรวจ —</div>`;
      return;
    }

    list.innerHTML = currentQueues.map(q => {
      const a = q.vasd_animal;
      const owner = a?.vasd_owner?.owner_name || '(ไม่ระบุ)';
      return `
        <div class="queue-row">
          <div class="queue-row-num">${a.queue_number || '-'}</div>
          <div class="queue-row-info">
            <div class="queue-row-name">${speciesIcon(a.species)} ${escapeHtml(a.animal_name)} <span style="color:var(--text-dim); font-weight:500; font-size:12px;">(${escapeHtml(a.sex || '-')})</span></div>
            <div class="queue-row-meta">👤 ${escapeHtml(owner)}</div>
          </div>
          <div class="queue-row-actions">
            <button class="btn-icon edit" onclick="openQueueForm('${q.id}')" title="แก้ไข">✏️</button>
            <button class="btn-icon del"  onclick="askDelete('${q.id}')" title="ลบ">🗑️</button>
          </div>
        </div>
      `;
    }).join('');
  } catch (e) {
    list.innerHTML = `<div class="queue-empty" style="color:var(--rose);">❌ โหลดไม่สำเร็จ: ${escapeHtml(e.message)}</div>`;
  }
}

// ──── Form: Add / Edit ────
window.openQueueForm = async function(queueId = null) {
  editingQueueId = queueId;
  const title = document.getElementById('qFormTitle');
  const subtitle = document.getElementById('qFormSubtitle');
  const submitBtn = document.getElementById('qFormSubmit');
  const statusGroup = document.getElementById('qFormStatusGroup');

  if (queueId) {
    // Edit mode
    const q = currentQueues.find(x => x.id === queueId);
    if (!q) return showToast('ไม่พบคิวนี้', true);
    const a = q.vasd_animal;
    const owner = a?.vasd_owner?.owner_name || '';

    title.textContent = '✏️ แก้ไขคิว';
    subtitle.textContent = `คิว #${a.queue_number}`;
    submitBtn.textContent = '💾 บันทึกการแก้ไข';

    document.getElementById('qFormNumber').value = a.queue_number || '';
    document.getElementById('qFormAnimal').value = a.animal_name || '';
    document.getElementById('qFormOwner').value = owner;
    document.querySelector(`input[name="qSpecies"][value="${a.species || 'ม'}"]`).checked = true;
    document.querySelector(`input[name="qSex"][value="${a.sex || 'เมีย'}"]`).checked = true;
    document.getElementById('qFormStatus').value = q.status;

    statusGroup.style.display = 'block';
    document.getElementById('qFormNumberHint').textContent = 'แก้หมายเลขคิวได้ตามต้องการ';
  } else {
    // Add mode
    title.textContent = '➕ เพิ่มคิวใหม่';
    subtitle.textContent = 'สำหรับวันนี้';
    submitBtn.textContent = '➕ เพิ่มคิว';

    // Auto-fill next queue number
    const nextNum = await getNextQueueNumber();
    document.getElementById('qFormNumber').value = nextNum;
    document.getElementById('qFormAnimal').value = '';
    document.getElementById('qFormOwner').value = '';
    document.querySelector('input[name="qSpecies"][value="ม"]').checked = true;
    document.querySelector('input[name="qSex"][value="เมีย"]').checked = true;

    statusGroup.style.display = 'none';
    document.getElementById('qFormNumberHint').textContent = 'ระบบเสนอเลขถัดไปให้ — แก้ไขได้';
  }

  document.getElementById('queueModal').classList.add('show');
};

window.closeQueueForm = function(ev) {
  if (ev && ev.target.id !== 'queueModal' && ev.type === 'click') return;
  document.getElementById('queueModal').classList.remove('show');
  editingQueueId = null;
};

async function getNextQueueNumber() {
  try {
    const { data: eventId } = await supabase.rpc('get_today_event');
    if (!eventId) return 1;
    const { data } = await supabase
      .from('vasd_animal')
      .select('queue_number')
      .eq('event_id', eventId)
      .order('queue_number', { ascending: false })
      .limit(1);
    return (data?.[0]?.queue_number || 0) + 1;
  } catch (e) { return 1; }
}

window.submitQueueForm = async function() {
  const num = parseInt(document.getElementById('qFormNumber').value);
  const animal = document.getElementById('qFormAnimal').value.trim();
  const owner = document.getElementById('qFormOwner').value.trim();
  const species = document.querySelector('input[name="qSpecies"]:checked').value;
  const sex = document.querySelector('input[name="qSex"]:checked').value;
  const status = document.getElementById('qFormStatus').value;

  if (!animal) return showToast('กรอกชื่อสัตว์ก่อน', true);
  if (!num || num < 1) return showToast('หมายเลขคิวไม่ถูกต้อง', true);

  const btn = document.getElementById('qFormSubmit');
  btn.disabled = true; btn.textContent = '⏳ กำลังบันทึก...';

  try {
    if (editingQueueId) {
      // ── EDIT ──
      const q = currentQueues.find(x => x.id === editingQueueId);
      if (!q) throw new Error('ไม่พบคิว');
      const a = q.vasd_animal;

      // update vasd_animal
      const { error: aErr } = await supabase
        .from('vasd_animal')
        .update({
          queue_number: num,
          animal_name: animal,
          species, sex
        })
        .eq('id', a.id);
      if (aErr) throw aErr;

      // update vasd_owner (ถ้ามี owner_id)
      if (a.owner_id) {
        const { error: oErr } = await supabase
          .from('vasd_owner')
          .update({ owner_name: owner || '(ไม่ระบุ)' })
          .eq('id', a.owner_id);
        if (oErr) throw oErr;
      }

      // update vasd_queue status
      if (status !== q.status) {
        const { error: qErr } = await supabase
          .from('vasd_queue')
          .update({ status, updated_at: new Date().toISOString() })
          .eq('id', editingQueueId);
        if (qErr) throw qErr;
      }

      showToast('✅ บันทึกการแก้ไขแล้ว');
    } else {
      // ── ADD ──
      const { data: eventId, error: evErr } = await supabase.rpc('get_today_event');
      if (evErr) throw evErr;

      // Insert owner
      const { data: ownerData, error: oErr } = await supabase
        .from('vasd_owner')
        .insert({ event_id: eventId, owner_name: owner || '(ไม่ระบุ)' })
        .select().single();
      if (oErr) throw oErr;

      // Insert animal
      const { data: animalData, error: aErr } = await supabase
        .from('vasd_animal')
        .insert({
          event_id: eventId,
          owner_id: ownerData.id,
          queue_number: num,
          animal_name: animal,
          species, sex
        })
        .select().single();
      if (aErr) throw aErr;

      // Insert queue
      const { error: qErr } = await supabase
        .from('vasd_queue')
        .insert({ animal_id: animalData.id, status: 'waiting' });
      if (qErr) throw qErr;

      showToast(`✅ เพิ่มคิว #${num} เรียบร้อย`);
    }

    closeQueueForm();
    loadQueueList();
  } catch (e) {
    showToast('❌ ' + e.message, true);
  } finally {
    btn.disabled = false;
  }
};

// ──── Delete ────
window.askDelete = function(queueId) {
  const q = currentQueues.find(x => x.id === queueId);
  if (!q) return;
  const a = q.vasd_animal;
  pendingDeleteId = queueId;
  document.getElementById('delModalText').innerHTML =
    `คิว #${a.queue_number} <b>${speciesIcon(a.species)} ${escapeHtml(a.animal_name)}</b><br>` +
    `<span style="color:var(--text-dim); font-size:12px;">เจ้าของ: ${escapeHtml(a?.vasd_owner?.owner_name || '-')}</span>`;
  document.getElementById('deleteModal').classList.add('show');
};

window.closeDeleteModal = function(ev) {
  if (ev && ev.target.id !== 'deleteModal' && ev.type === 'click') return;
  document.getElementById('deleteModal').classList.remove('show');
  pendingDeleteId = null;
};

window.confirmDelete = async function() {
  if (!pendingDeleteId) return;
  try {
    const { error } = await supabase
      .from('vasd_queue')
      .delete()
      .eq('id', pendingDeleteId);
    if (error) throw error;
    showToast('🗑️ ลบคิวเรียบร้อย');
    closeDeleteModal();
    loadQueueList();
  } catch (e) {
    showToast('❌ ลบไม่สำเร็จ: ' + e.message, true);
  }
};

// ─────────────────────────────────────────────
// Realtime sync
// ─────────────────────────────────────────────
supabase.channel('q-setting-sync')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'vasd_queue' }, loadQueueList)
  .on('postgres_changes', { event: '*', schema: 'public', table: 'vasd_animal' }, loadQueueList)
  .subscribe();

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
loadSettings();
loadQueueList();
</script>
