<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ลงทะเบียนสัตว์ – VASD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&family=Kanit:wght@300;400;500;700&family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════
    DESIGN TOKENS & BASE
═══════════════════════════════════════════ */
:root {
  --navy:       #0b1929;
  --navy-mid:   #112240;
  --teal:       #0ea5a0;
  --teal-light: #14c4bc;
  --teal-glow:  rgba(14,165,160,0.25);
  --amber:      #f59e0b;
  --rose:       #ef4444;
  --rose-soft:  rgba(239,68,68,0.15);
  --surface:    rgba(255,255,255,0.04);
  --surface-2:  rgba(255,255,255,0.07);
  --surface-3:  rgba(255,255,255,0.10);
  --border:     rgba(255,255,255,0.08);
  --border-2:   rgba(255,255,255,0.14);
  --text:       #e2e8f0;
  --text-dim:   #94a3b8;
  --radius-sm:  10px;
  --radius:     16px;
  --radius-lg:  22px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Sarabun", sans-serif;
  background: var(--navy);
  color: var(--text);
  min-height: 100vh;
  display: flex; flex-direction: column;
  overflow-x: hidden;
}

body::before {
  content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse 60% 50% at 20% 10%, rgba(14,165,160,0.10) 0%, transparent 70%);
}

/* ═══════════════════════════════════════════
    HEADER & LAYOUT
═══════════════════════════════════════════ */
header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(11,25,41,0.88); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo { width: 38px; height: 38px; background: linear-gradient(135deg, var(--teal), var(--teal-light)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 0 20px var(--teal-glow); }
.brand-name { font-family: "Outfit", sans-serif; font-size: 15px; font-weight: 700; color: #fff; }

.wrap { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 24px 16px 100px; width: 100%; display: flex; flex-direction: column; gap: 16px; }
.page-title { font-family: "Outfit", sans-serif; font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 4px; }

/* ═══════════════════════════════════════════
    CARDS & FORM
═══════════════════════════════════════════ */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--surface-2); }
.card-header-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--teal); display: flex; align-items: center; justify-content: center; font-size: 15px; }
.card-header h4 { font-size: 14px; font-weight: 700; color: #fff; flex: 1; }

.card-body { padding: 18px; }
.field-group { display: flex; flex-direction: column; gap: 5px; }
.field-label { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

input, select, textarea { 
  width: 100%; padding: 10px 12px; font-size: 14px; font-family: "Sarabun", sans-serif; 
  background: var(--surface-2); border: 1px solid var(--border-2); border-radius: var(--radius-sm); color: var(--text); outline: none; transition: 0.2s;
}
input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-glow); }

/* Grid Layouts */
.owner-row { display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 12px; align-items: end; margin-bottom: 12px; }
.owner-row-2 { display: grid; grid-template-columns: 1fr 2fr; gap: 12px; }
.animal-fields { display: grid; grid-template-columns: 1fr 1fr 1fr 80px; gap: 10px; margin-bottom: 14px; }

@media (max-width: 768px) {
  .owner-row, .owner-row-2, .animal-fields { grid-template-columns: 1fr; }
}

/* ═══════════════════════════════════════════
    BUTTONS
═══════════════════════════════════════════ */
.btn { padding: 10px 16px; font-size: 13px; font-weight: 600; border: none; border-radius: var(--radius-sm); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; white-space: nowrap; }
.btn:active { transform: scale(0.96); }

.btn-read-card { background: rgba(14,165,160,0.15); color: var(--teal-light); border: 1px solid rgba(14,165,160,0.4); }
.btn-read-card:hover { background: rgba(14,165,160,0.25); box-shadow: 0 0 15px var(--teal-glow); }

.btn-paste { background: var(--surface-3); color: var(--text-dim); border: 1px solid var(--border-2); }
.btn-add { background: var(--surface-3); color: var(--text); border: 1px solid var(--border-2); margin-top: 10px; }

.btn-del-animal { margin-left: auto; padding: 6px 12px; font-size: 12px; background: var(--rose-soft); color: var(--rose); border: 1px solid rgba(239,68,68,0.2); }
.btn-del-animal:hover { background: var(--rose); color: #fff; }

.btn-submit { 
  background: linear-gradient(135deg, var(--teal), var(--teal-light)); color: #fff; 
  font-size: 15px; padding: 16px; border-radius: var(--radius); width: 100%; justify-content: center; margin-top: 20px;
  box-shadow: 0 4px 20px var(--teal-glow);
}
.btn-submit.waiting { background: var(--amber); animation: pulse 1.5s infinite alternate; }

/* ═══════════════════════════════════════════
    ANIMAL CARDS & CHIPS
═══════════════════════════════════════════ */
.animal-card { background: var(--surface-2); border: 1px solid var(--border-2); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; animation: slideUp 0.3s ease both; }
.animal-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
.animal-card-num { width: 26px; height: 26px; border-radius: 50%; background: var(--teal); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; }

.svc-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.svc-chip { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 12px; background: var(--surface); border: 1px solid var(--border-2); color: var(--text-dim); border-radius: 20px; padding: 6px 14px; transition: 0.2s; }
.svc-chip.checked { background: rgba(14,165,160,0.15); border-color: var(--teal); color: var(--teal-light); }
.svc-chip input { display: none; }

#printArea { display: none; }
@media print {
  body > :not(#printArea) { display: none !important; }
  #printArea { display: block !important; }
  .sticker-page { position: relative; width: 80mm; height: 50mm; page-break-after: always; background: #fff; }
  .line { position: absolute; color: #000 !important; }
}

@keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { from { opacity: 0.7; } to { opacity: 1; } }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo">📝</div>
    <div class="brand-name">VASD Registration</div>
  </div>
  <button class="btn btn-paste" onclick="location.href='index.html'">🏠 หน้าหลัก</button>
</header>

<div class="wrap">
  <h2 class="page-title">ลงทะเบียนสัตว์</h2>
  
  <div class="card">
    <div class="card-header"><div class="card-header-icon">👤</div><h4>ข้อมูลเจ้าของสัตว์</h4></div>
    <div class="card-body">
      <div class="owner-row">
        <div class="field-group"><label class="field-label">ชื่อเจ้าของ *</label><input id="ownerName" placeholder="ระบุชื่อ-นามสกุล"></div>
        <div class="field-group"><label class="field-label">เบอร์โทร</label><input id="phone" type="tel" placeholder="08x-xxx-xxxx"></div>
        <div class="field-group"><label class="field-label" style="opacity:0">Read</label><button type="button" class="btn btn-read-card" onclick="window.readSmartCard()">🪪 อ่านบัตร</button></div>
        <div class="field-group"><label class="field-label" style="opacity:0">Paste</label><button type="button" class="btn btn-paste" onclick="window.pasteOwnerName()">📋 วาง</button></div>
      </div>
      <div class="owner-row-2">
        <div class="field-group"><label class="field-label">เลขบัตรประชาชน</label><input id="idCard" maxlength="13" placeholder="เลข 13 หลัก"></div>
        <div class="field-group"><label class="field-label">ที่อยู่</label><input id="address" placeholder="บ้านเลขที่ หมู่ ตำบล อำเภอ จังหวัด"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><div class="card-header-icon">🐾</div><h4>รายการสัตว์</h4></div>
    <div class="card-body">
      <div id="animalList"></div>
      <button type="button" class="btn btn-add" onclick="window.addAnimal()">➕ เพิ่มรายการสัตว์</button>
    </div>
  </div>

  <button type="button" id="btnRequestConsent" class="btn btn-submit" onclick="window.requestConsent()">📲 ส่งคำขอ Consent ไปยัง iPad</button>
</div>

<div id="printArea"></div>

<script type="module">
import { supabase } from "./js/supabase.js";

let animalCount = 0;
let isWaitingForConsent = false;
const consentChannel = supabase.channel('vasd-consent-room');

// Listen for iPad Approval
consentChannel.on('broadcast', { event: 'consent-granted' }, () => {
    if (isWaitingForConsent) executeSave();
}).subscribe();

/* ── ฟังก์ชันอ่านบัตรประชาชน ── */
window.readSmartCard = async function() {
    const btn = event.currentTarget;
    const originalText = btn.innerHTML;
    try {
        btn.disabled = true;
        btn.innerHTML = "⏳...";
        const res = await fetch('http://127.0.0.1:8080/read');
        const result = await res.json();
        if (result.status === "success") {
            const p = result.data;
            document.getElementById("ownerName").value = p.prefix + p.firstname + " " + p.lastname;
            document.getElementById("idCard").value = p.cid;
            document.getElementById("address").value = p.address;
            document.getElementById("phone").focus();
        } else alert("❌ " + result.message);
    } catch (e) { alert("❌ โปรดเปิดโปรแกรม Python Agent ก่อนใช้งาน"); }
    finally { btn.disabled = false; btn.innerHTML = originalText; }
};

/* ── ฟังก์ชันวางชื่อจากคลิปบอร์ด ── */
window.pasteOwnerName = async function() {
    try {
        const text = await navigator.clipboard.readText();
        document.getElementById("ownerName").value = text.trim();
    } catch (e) { alert("ไม่สามารถเข้าถึงคลิปบอร์ดได้"); }
};

/* ── ฟังก์ชันเพิ่มการ์ดสัตว์ ── */
window.addAnimal = function () {
    animalCount++;
    const card = document.createElement("div");
    card.className = "animal-card";
    card.innerHTML = `
        <div class="animal-card-header">
            <div class="animal-card-num">${animalCount}</div>
            <span style="font-weight:700; font-size:14px;">สัตว์รายการที่ ${animalCount}</span>
            <button type="button" class="btn btn-del-animal" onclick="this.closest('.animal-card').remove(); window.refreshCount();">🗑 ลบ</button>
        </div>
        <div class="animal-fields">
            <div class="field-group"><label class="field-label">ชื่อสัตว์ *</label><input class="animalName" required></div>
            <div class="field-group">
                <label class="field-label">ชนิด</label>
                <select class="species"><option value="ม">🐱 แมว</option><option value="ส">🐶 สุนัข</option></select>
            </div>
            <div class="field-group">
                <label class="field-label">เพศ</label>
                <select class="sex"><option value="เมีย">♀ เมีย</option><option value="ผู้">♂ ผู้</option></select>
            </div>
            <div class="field-group"><label class="field-label">นน. (กก.)</label><input type="number" class="estWeight" value="3" step="0.1"></div>
        </div>
        <div class="svc-label-row field-label">บริการที่ต้องการ</div>
        <div class="svc-grid"></div>
    `;
    
    const svcGrid = card.querySelector(".svc-grid");
    const species = card.querySelector(".species");
    const sex = card.querySelector(".sex");

    const refreshChips = () => {
        const neuter = sex.value === "ผู้" ? "ทำหมันเพศผู้" : "ทำหมันเพศเมีย";
        const list = [neuter, "ฉีดวัคซีนพิษสุนัขบ้า", "ตรวจเลือด", "ฝังไมโครชิฟ"];
        svcGrid.innerHTML = list.map((s, i) => `
            <label class="svc-chip ${i===0?'checked':''}">
                <input type="checkbox" class="svc" value="${s}" ${i===0?'checked':''}>${s}
            </label>
        `).join("");
        svcGrid.querySelectorAll(".svc-chip").forEach(chip => {
            chip.onclick = (e) => {
                const cb = chip.querySelector("input");
                cb.checked = !cb.checked;
                chip.classList.toggle("checked", cb.checked);
            };
        });
    };

    species.onchange = sex.onchange = refreshChips;
    refreshChips();
    document.getElementById("animalList").appendChild(card);
    window.refreshCount();
};

window.refreshCount = () => {
    const cards = document.querySelectorAll(".animal-card");
    cards.forEach((c, i) => c.querySelector(".animal-card-num").textContent = i + 1);
};

/* ── ฟังก์ชันส่ง Consent ── */
window.requestConsent = function() {
    const ownerName = document.getElementById("ownerName").value.trim();
    if (!ownerName) return alert("กรุณาระบุชื่อเจ้าของ");
    
    const animals = [];
    document.querySelectorAll(".animal-card").forEach(c => {
        const svcs = [];
        c.querySelectorAll(".svc:checked").forEach(s => svcs.push(s.value));
        animals.push({
            name: c.querySelector(".animalName").value,
            species: c.querySelector(".species").value === "ม" ? "แมว" : "สุนัข",
            sex: c.querySelector(".sex").value,
            services: svcs
        });
    });

    if (animals.length === 0) return alert("กรุณาเพิ่มสัตว์อย่างน้อย 1 รายการ");

    const btn = document.getElementById("btnRequestConsent");
    btn.disabled = true; btn.classList.add("waiting");
    btn.textContent = "⏳ รอการยืนยันจาก iPad...";
    isWaitingForConsent = true;

    consentChannel.send({
        type: 'broadcast', event: 'request-consent',
        payload: { owner: { name: ownerName }, animals }
    });
};

// บันทึกข้อมูล (จำลอง logic หลัก)
async function executeSave() {
    alert("✅ ได้รับการยินยอมแล้ว! ระบบจะทำการบันทึกข้อมูล...");
    // Logic บันทึก Supabase และสั่งพิมพ์
    location.reload(); 
}

window.addAnimal();
</script>
</body>
</html>
