<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ลงทะเบียนสัตว์ – VASD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&family=Kanit:wght@300;400;500;700&family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --navy:       #0b1929;
  --navy-mid:   #112240;
  --teal:       #0ea5a0;
  --teal-light: #14c4bc;
  --teal-glow:  rgba(14,165,160,0.25);
  --emerald:    #10b981;
  --amber:      #f59e0b;
  --violet:     #8b5cf6;
  --rose:       #ef4444;
  --rose-soft:  rgba(239,68,68,0.15);
  --surface:    rgba(255,255,255,0.04);
  --surface-2:  rgba(255,255,255,0.07);
  --surface-3:  rgba(255,255,255,0.10);
  --border:     rgba(255,255,255,0.08);
  --border-2:   rgba(255,255,255,0.14);
  --text:       #e2e8f0;
  --text-dim:   #94a3b8;
  --radius-sm:  10px;
  --radius:     16px;
  --radius-lg:  22px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Sarabun", sans-serif;
  background: var(--navy);
  color: var(--text);
  min-height: 100vh;
  display: flex; flex-direction: column;
  overflow-x: hidden;
}

body::before {
  content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse 60% 50% at 20% 10%, rgba(14,165,160,0.10) 0%, transparent 70%);
}

header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(11,25,41,0.88); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo { width: 38px; height: 38px; background: linear-gradient(135deg, var(--teal), var(--teal-light)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 0 20px var(--teal-glow); }
.brand-name { font-family: "Outfit", sans-serif; font-size: 15px; font-weight: 700; color: #fff; }

.wrap { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 24px 16px 100px; width: 100%; display: flex; flex-direction: column; gap: 16px; }
.page-title { font-family: "Outfit", sans-serif; font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 4px; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--surface-2); }
.card-header-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--teal); display: flex; align-items: center; justify-content: center; font-size: 15px; }
.card-header-icon.violet { background: var(--violet); }
.card-header h4 { font-size: 14px; font-weight: 700; color: #fff; flex: 1; }
.card-body { padding: 18px; }

.field-group { display: flex; flex-direction: column; gap: 5px; }
.field-label { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

input, select, textarea {
  width: 100%; padding: 10px 12px; font-size: 14px; font-family: "Sarabun", sans-serif;
  background: var(--surface-2); border: 1px solid var(--border-2); border-radius: var(--radius-sm); color: var(--text); outline: none; transition: 0.2s;
}
input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-glow); }

.owner-row { display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 12px; align-items: end; margin-bottom: 12px; }
.owner-row-2 { display: grid; grid-template-columns: 1fr 2fr; gap: 12px; }
.animal-fields { display: grid; grid-template-columns: 1fr 1fr 1fr 80px; gap: 10px; margin-bottom: 14px; }

@media (max-width: 768px) {
  .owner-row, .owner-row-2, .animal-fields { grid-template-columns: 1fr; }
}

/* ── Search Card ── */
.search-wrap { position: relative; }
.search-input-row {
  display: flex; gap: 10px; align-items: center;
}
#ownerSearch {
  font-size: 14px; padding: 12px 14px;
}
#searchResults {
  margin-top: 10px;
  max-height: 320px; overflow-y: auto;
  display: none;
  border: 1px solid var(--border-2);
  border-radius: var(--radius-sm);
  background: rgba(0,0,0,0.2);
}
#searchResults.show { display: block; }
.sr-item {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: 0.15s;
}
.sr-item:last-child { border-bottom: none; }
.sr-item:hover { background: rgba(14,165,160,0.08); }
.sr-name { font-size: 14px; font-weight: 700; color: #fff; }
.sr-meta { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.sr-today { color: var(--teal-light); font-weight: 700; }
.sr-old { color: var(--text-dim); }
.sr-animals { font-size: 12px; color: var(--amber); margin-top: 4px; }
.sr-empty {
  padding: 20px; text-align: center;
  color: var(--text-dim); font-size: 13px;
}

#selectedOwnerBadge {
  display: none;
  margin-top: 12px;
  background: rgba(16, 185, 129, 0.12);
  border: 1px solid rgba(16, 185, 129, 0.4);
  color: #34d399;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
#selectedOwnerBadge.show { display: flex; }
#selectedOwnerBadge.cross-day {
  background: rgba(245, 158, 11, 0.10);
  border-color: rgba(245, 158, 11, 0.4);
  color: var(--amber);
}
.badge-clear-btn {
  background: transparent; color: inherit;
  border: 1px solid currentColor;
  padding: 4px 10px; border-radius: 6px;
  font-size: 11px; cursor: pointer;
  font-family: inherit; white-space: nowrap;
}
.badge-clear-btn:hover { background: rgba(255,255,255,0.08); }

/* ── Buttons ── */
.btn { padding: 10px 16px; font-size: 13px; font-weight: 600; border: none; border-radius: var(--radius-sm); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; white-space: nowrap; }
.btn:active { transform: scale(0.96); }

.btn-read-card { background: rgba(14,165,160,0.15); color: var(--teal-light); border: 1px solid rgba(14,165,160,0.4); }
.btn-read-card:hover { background: rgba(14,165,160,0.25); box-shadow: 0 0 15px var(--teal-glow); }

.btn-paste { background: var(--surface-3); color: var(--text-dim); border: 1px solid var(--border-2); }
.btn-add { background: var(--surface-3); color: var(--text); border: 1px solid var(--border-2); margin-top: 10px; }

.btn-del-animal { margin-left: auto; padding: 6px 12px; font-size: 12px; background: var(--rose-soft); color: var(--rose); border: 1px solid rgba(239,68,68,0.2); }
.btn-del-animal:hover { background: var(--rose); color: #fff; }

.btn-submit {
  background: linear-gradient(135deg, var(--teal), var(--teal-light)); color: #fff;
  font-size: 15px; padding: 16px; border-radius: var(--radius); width: 100%; justify-content: center; margin-top: 20px;
  box-shadow: 0 4px 20px var(--teal-glow);
}
.btn-submit.waiting { background: var(--amber); animation: pulse 1.5s infinite alternate; }
.btn-submit.saving { background: linear-gradient(135deg, #3b82f6, #2563eb); }

.btn-cancel-wait {
  background: var(--rose-soft); color: var(--rose);
  border: 1px solid rgba(239,68,68,0.3);
  padding: 8px 14px; font-size: 12px;
  border-radius: var(--radius-sm); cursor: pointer;
  margin-top: 8px; display: none;
}
.btn-cancel-wait.show { display: inline-block; }

.animal-card { background: var(--surface-2); border: 1px solid var(--border-2); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; animation: slideUp 0.3s ease both; }
.animal-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
.animal-card-num { width: 26px; height: 26px; border-radius: 50%; background: var(--teal); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; }

.svc-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.svc-chip { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 12px; background: var(--surface); border: 1px solid var(--border-2); color: var(--text-dim); border-radius: 20px; padding: 6px 14px; transition: 0.2s; }
.svc-chip.checked { background: rgba(14,165,160,0.15); border-color: var(--teal); color: var(--teal-light); }
.svc-chip input { display: none; }

#printArea { display: none; }
@media print {
  body > :not(#printArea) { display: none !important; }
  #printArea { display: block !important; }
  .sticker-page { position: relative; width: 80mm; height: 50mm; page-break-after: always; background: #fff; }
  .line { position: absolute; color: #000 !important; }
}

@keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { from { opacity: 0.7; } to { opacity: 1; } }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo">📝</div>
    <div class="brand-name">VASD Registration</div>
  </div>
  <button class="btn btn-paste" onclick="location.href='index.html'">🏠 หน้าหลัก</button>
</header>

<div class="wrap">
  <h2 class="page-title">ลงทะเบียนสัตว์</h2>

  <!-- ★ NEW: Owner Search Card -->
  <div class="card">
    <div class="card-header">
      <div class="card-header-icon violet">🔍</div>
      <h4>ค้นหาเจ้าของเดิม (เลือกเพื่อใช้ข้อมูลเดิม)</h4>
    </div>
    <div class="card-body">
      <div class="search-wrap">
        <input id="ownerSearch" placeholder="พิมพ์ ชื่อ / เบอร์โทร / เลขบัตร (อย่างน้อย 2 ตัวอักษร)" autocomplete="off">
        <div id="searchResults"></div>
        <div id="selectedOwnerBadge"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><div class="card-header-icon">👤</div><h4>ข้อมูลเจ้าของสัตว์</h4></div>
    <div class="card-body">
      <div class="owner-row">
        <div class="field-group"><label class="field-label">ชื่อเจ้าของ *</label><input id="ownerName" placeholder="ระบุชื่อ-นามสกุล"></div>
        <div class="field-group"><label class="field-label">เบอร์โทร</label><input id="phone" type="tel" placeholder="08x-xxx-xxxx"></div>
        <div class="field-group"><label class="field-label" style="opacity:0">Read</label><button type="button" class="btn btn-read-card" onclick="window.readSmartCard(event)">🪪 อ่านบัตร</button></div>
        <div class="field-group"><label class="field-label" style="opacity:0">Paste</label><button type="button" class="btn btn-paste" onclick="window.pasteOwnerName()">📋 วาง</button></div>
      </div>
      <div class="owner-row-2">
        <div class="field-group"><label class="field-label">เลขบัตรประชาชน</label><input id="idCard" maxlength="13" placeholder="เลข 13 หลัก"></div>
        <div class="field-group"><label class="field-label">ที่อยู่</label><input id="address" placeholder="บ้านเลขที่ หมู่ ตำบล อำเภอ จังหวัด"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><div class="card-header-icon">🐾</div><h4>รายการสัตว์</h4></div>
    <div class="card-body">
      <div id="animalList"></div>
      <button type="button" class="btn btn-add" onclick="window.addAnimal()">➕ เพิ่มรายการสัตว์</button>
    </div>
  </div>

  <button type="button" id="btnRequestConsent" class="btn btn-submit" onclick="window.requestConsent()">📲 ส่งคำขอ Consent ไปยัง iPad</button>
  <button type="button" id="btnCancelWait" class="btn btn-cancel-wait" onclick="window.cancelWait()">✖ ยกเลิกและเริ่มใหม่</button>
</div>

<div id="printArea"></div>

<script type="module">
import { supabase } from "./js/supabase.js";

let animalCount = 0;
let isWaitingForConsent = false;
let pendingSaveData = null;
let selectedOwner = null;     // ★ เจ้าของที่เลือกจากการค้นหา
let todayEventId = null;      // event_id ของวันนี้

const consentChannel = supabase.channel('vasd-consent-room');

consentChannel.on('broadcast', { event: 'consent-granted' }, () => {
    if (isWaitingForConsent) executeSave();
}).subscribe();

// ดึง event_id วันนี้ตอนเปิดหน้า
(async () => {
  try {
    const { data, error } = await supabase.rpc('get_today_event');
    if (!error) todayEventId = data;
  } catch (e) {}
})();

/* ─────────────────────────────────────────────
   ★ OWNER SEARCH
───────────────────────────────────────────── */
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

let searchTimer = null;
document.getElementById('ownerSearch').addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (q.length < 2) {
    hideResults();
    return;
  }
  searchTimer = setTimeout(() => searchOwners(q), 300);
});

function hideResults() {
  const r = document.getElementById('searchResults');
  r.classList.remove('show');
  r.innerHTML = '';
}

async function searchOwners(query) {
  const safe = query.replace(/[,()]/g, '');
  if (safe.length < 2) return;

  try {
    const { data, error } = await supabase
      .from('vasd_owner')
      .select('id, event_id, owner_name, phone, id_card, address, created_at, vasd_animal(id, animal_name, species, queue_number)')
      .or(`owner_name.ilike.%${safe}%,phone.ilike.%${safe}%,id_card.ilike.%${safe}%`)
      .order('created_at', { ascending: false })
      .limit(15);

    if (error) throw error;
    renderResults(data || []);
  } catch (e) {
    console.error('[Search] error:', e);
    const r = document.getElementById('searchResults');
    r.innerHTML = `<div class="sr-empty">⚠️ ค้นหาผิดพลาด: ${escapeHtml(e.message)}</div>`;
    r.classList.add('show');
  }
}

function renderResults(results) {
  const r = document.getElementById('searchResults');
  if (results.length === 0) {
    r.innerHTML = '<div class="sr-empty">ไม่พบเจ้าของในระบบ — กรอกข้อมูลใหม่ด้านล่างได้เลย</div>';
    r.classList.add('show');
    return;
  }

  r.innerHTML = results.map((o, idx) => {
    const isToday = o.event_id === todayEventId;
    const d = new Date(o.created_at);
    const dateStr = isToday
      ? `<span class="sr-today">⭐ วันนี้</span>`
      : `<span class="sr-old">📅 ${d.toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: '2-digit' })}</span>`;

    const animals = (o.vasd_animal || []).map(a =>
      `${a.species === 'ม' ? '🐱' : '🐶'} ${escapeHtml(a.animal_name)} #${a.queue_number}`
    ).join('  ·  ');

    return `
      <div class="sr-item" data-idx="${idx}">
        <div class="sr-name">${escapeHtml(o.owner_name)}</div>
        <div class="sr-meta">
          ☎ ${escapeHtml(o.phone || '-')} &nbsp;|&nbsp;
          🪪 ${escapeHtml(o.id_card || '-')} &nbsp;|&nbsp; ${dateStr}
        </div>
        ${animals ? `<div class="sr-animals">🐾 ${animals}</div>` : ''}
      </div>
    `;
  }).join('');
  r.classList.add('show');

  r.querySelectorAll('.sr-item').forEach(el => {
    el.onclick = () => selectOwnerFromSearch(results[parseInt(el.dataset.idx)]);
  });
}

function selectOwnerFromSearch(owner) {
  selectedOwner = owner;
  document.getElementById('ownerName').value = owner.owner_name || '';
  document.getElementById('phone').value    = owner.phone || '';
  document.getElementById('idCard').value   = owner.id_card || '';
  document.getElementById('address').value  = owner.address || '';

  const isToday = owner.event_id === todayEventId;
  const badge = document.getElementById('selectedOwnerBadge');
  badge.className = isToday ? 'show' : 'show cross-day';
  badge.innerHTML = `
    <span>
      ${isToday
        ? `✓ เพิ่มสัตว์เข้าเจ้าของเดิม <b>${escapeHtml(owner.owner_name)}</b> (วันนี้)`
        : `↻ ใช้ข้อมูล <b>${escapeHtml(owner.owner_name)}</b> (จาก ${new Date(owner.created_at).toLocaleDateString('th-TH')}) — จะสร้างเรกคอร์ดใหม่`
      }
    </span>
    <button class="badge-clear-btn" onclick="window.clearSelectedOwner()">✖ เริ่มใหม่</button>
  `;

  document.getElementById('ownerSearch').value = '';
  hideResults();
}

window.clearSelectedOwner = function() {
  selectedOwner = null;
  document.getElementById('selectedOwnerBadge').classList.remove('show', 'cross-day');
  document.getElementById('selectedOwnerBadge').innerHTML = '';
  document.getElementById('ownerName').value = '';
  document.getElementById('phone').value = '';
  document.getElementById('idCard').value = '';
  document.getElementById('address').value = '';
};

// ถ้าผู้ใช้แก้ไขฟิลด์เจ้าของหลังเลือก → ยกเลิกการ "ใช้ข้อมูลเดิม"
['ownerName', 'phone', 'idCard', 'address'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    if (!selectedOwner) return;
    const cur = {
      name:    document.getElementById('ownerName').value,
      phone:   document.getElementById('phone').value,
      idCard:  document.getElementById('idCard').value,
      address: document.getElementById('address').value
    };
    const differs =
      cur.name    !== (selectedOwner.owner_name || '') ||
      cur.phone   !== (selectedOwner.phone || '')      ||
      cur.idCard  !== (selectedOwner.id_card || '')    ||
      cur.address !== (selectedOwner.address || '');
    if (differs) {
      selectedOwner = null;
      document.getElementById('selectedOwnerBadge').classList.remove('show', 'cross-day');
    }
  });
});

// คลิกข้างนอก → ปิดผลค้นหา
document.addEventListener('click', (e) => {
  if (!e.target.closest('#ownerSearch') && !e.target.closest('#searchResults')) {
    hideResults();
  }
});

/* ─────────────────────────────────────────────
   อ่านบัตรประชาชน / วางชื่อจาก clipboard
───────────────────────────────────────────── */
window.readSmartCard = async function(ev) {
    const btn = ev.currentTarget;
    const originalText = btn.innerHTML;
    try {
        btn.disabled = true;
        btn.innerHTML = "⏳...";
        const res = await fetch('http://127.0.0.1:8080/read');
        const result = await res.json();
        if (result.status === "success") {
            const p = result.data;
            document.getElementById("ownerName").value = p.prefix + p.firstname + " " + p.lastname;
            document.getElementById("idCard").value = p.cid;
            document.getElementById("address").value = p.address;
            document.getElementById("phone").focus();
            // ★ smart card = ข้อมูลใหม่ ไม่ใช่ selected owner
            if (selectedOwner) {
              selectedOwner = null;
              document.getElementById('selectedOwnerBadge').classList.remove('show', 'cross-day');
            }
        } else alert("❌ " + result.message);
    } catch (e) { alert("❌ โปรดเปิดโปรแกรม Python Agent ก่อนใช้งาน"); }
    finally { btn.disabled = false; btn.innerHTML = originalText; }
};

window.pasteOwnerName = async function() {
    try {
        const text = await navigator.clipboard.readText();
        document.getElementById("ownerName").value = text.trim();
    } catch (e) { alert("ไม่สามารถเข้าถึงคลิปบอร์ดได้"); }
};

/* ─────────────────────────────────────────────
   เพิ่มสัตว์
───────────────────────────────────────────── */
window.addAnimal = function () {
    animalCount++;
    const card = document.createElement("div");
    card.className = "animal-card";
    card.innerHTML = `
        <div class="animal-card-header">
            <div class="animal-card-num">${animalCount}</div>
            <span style="font-weight:700; font-size:14px;">สัตว์รายการที่ ${animalCount}</span>
            <button type="button" class="btn btn-del-animal" onclick="this.closest('.animal-card').remove(); window.refreshCount();">🗑 ลบ</button>
        </div>
        <div class="animal-fields">
            <div class="field-group"><label class="field-label">ชื่อสัตว์ *</label><input class="animalName" required></div>
            <div class="field-group">
                <label class="field-label">ชนิด</label>
                <select class="species"><option value="ม">🐱 แมว</option><option value="ส">🐶 สุนัข</option></select>
            </div>
            <div class="field-group">
                <label class="field-label">เพศ</label>
                <select class="sex"><option value="เมีย">♀ เมีย</option><option value="ผู้">♂ ผู้</option></select>
            </div>
            <div class="field-group"><label class="field-label">นน. (กก.)</label><input type="number" class="estWeight" value="3" step="0.1"></div>
        </div>
        <div class="svc-label-row field-label">บริการที่ต้องการ</div>
        <div class="svc-grid"></div>
    `;

    const svcGrid = card.querySelector(".svc-grid");
    const species = card.querySelector(".species");
    const sex = card.querySelector(".sex");

    const refreshChips = () => {
        const neuter = sex.value === "ผู้" ? "ทำหมันเพศผู้" : "ทำหมันเพศเมีย";
        const list = [neuter, "ฉีดวัคซีนพิษสุนัขบ้า", "ตรวจเลือด", "ฝังไมโครชิฟ"];
        svcGrid.innerHTML = list.map((s, i) => `
            <label class="svc-chip ${i===0?'checked':''}">
                <input type="checkbox" class="svc" value="${s}" ${i===0?'checked':''}>${s}
            </label>
        `).join("");
        svcGrid.querySelectorAll(".svc-chip").forEach(chip => {
            chip.onclick = (e) => {
                const cb = chip.querySelector("input");
                cb.checked = !cb.checked;
                chip.classList.toggle("checked", cb.checked);
            };
        });
    };

    species.onchange = sex.onchange = refreshChips;
    refreshChips();
    document.getElementById("animalList").appendChild(card);
    window.refreshCount();
};

window.refreshCount = () => {
    const cards = document.querySelectorAll(".animal-card");
    cards.forEach((c, i) => c.querySelector(".animal-card-num").textContent = i + 1);
};

/* ─────────────────────────────────────────────
   ส่ง Consent
───────────────────────────────────────────── */
window.requestConsent = function() {
    const ownerName = document.getElementById("ownerName").value.trim();
    if (!ownerName) return alert("กรุณาระบุชื่อเจ้าของ");

    const phone   = document.getElementById("phone").value.trim();
    const idCard  = document.getElementById("idCard").value.trim();
    const address = document.getElementById("address").value.trim();

    const animals = [];
    let invalidName = false;
    document.querySelectorAll(".animal-card").forEach(c => {
        const animalName = c.querySelector(".animalName").value.trim();
        if (!animalName) { invalidName = true; return; }
        const svcs = [];
        c.querySelectorAll(".svc:checked").forEach(s => svcs.push(s.value));
        animals.push({
            name: animalName,
            species: c.querySelector(".species").value,
            sex: c.querySelector(".sex").value,
            estWeight: parseFloat(c.querySelector(".estWeight").value) || null,
            services: svcs
        });
    });

    if (invalidName) return alert("กรุณาระบุชื่อสัตว์ทุกรายการ");
    if (animals.length === 0) return alert("กรุณาเพิ่มสัตว์อย่างน้อย 1 รายการ");

    pendingSaveData = {
        owner: { name: ownerName, phone, idCard, address },
        selectedOwner,  // ★ เก็บไว้ใช้ตอน save
        animals
    };

    const btn = document.getElementById("btnRequestConsent");
    btn.disabled = true; btn.classList.add("waiting");
    btn.textContent = "⏳ รอการยืนยันจาก iPad...";
    document.getElementById("btnCancelWait").classList.add("show");
    isWaitingForConsent = true;

    consentChannel.send({
        type: 'broadcast', event: 'request-consent',
        payload: {
            owner: { name: ownerName, phone, idCard, address },
            animals: animals.map(a => ({
                name: a.name,
                species: a.species === "ม" ? "แมว" : "สุนัข",
                sex: a.sex,
                services: a.services
            }))
        }
    });
};

window.cancelWait = function() {
    if (!confirm("ยกเลิกการรอและเริ่มใหม่?")) return;
    isWaitingForConsent = false;
    pendingSaveData = null;
    const btn = document.getElementById("btnRequestConsent");
    btn.disabled = false;
    btn.classList.remove("waiting");
    btn.textContent = "📲 ส่งคำขอ Consent ไปยัง iPad";
    document.getElementById("btnCancelWait").classList.remove("show");
};

/* ─────────────────────────────────────────────
   บันทึกลง Supabase (มี logic เลือกระหว่าง reuse owner_id หรือสร้างใหม่)
───────────────────────────────────────────── */
async function executeSave() {
    if (!pendingSaveData) {
        alert("❌ ไม่พบข้อมูลที่จะบันทึก กรุณาเริ่มใหม่");
        location.reload();
        return;
    }

    const btn = document.getElementById("btnRequestConsent");
    btn.classList.remove("waiting");
    btn.classList.add("saving");
    btn.textContent = "💾 กำลังบันทึก...";
    document.getElementById("btnCancelWait").classList.remove("show");
    isWaitingForConsent = false;

    try {
        // 1. ดึง event_id วันนี้ (สดๆ ป้องกันข้ามวัน)
        const { data: eventId, error: evtErr } = await supabase.rpc('get_today_event');
        if (evtErr) throw new Error('Event: ' + evtErr.message);

        // 2. ★ ตัดสินใจ: reuse owner_id เดิม หรือสร้างใหม่
        let ownerIdToUse;
        let reused = false;
        const sel = pendingSaveData.selectedOwner;

        if (sel && sel.id && sel.event_id === eventId) {
            // เจ้าของเดิมของวันนี้ → reuse
            ownerIdToUse = sel.id;
            reused = true;
            console.log('[Save] Reusing existing owner from today:', sel.owner_name, sel.id);
        } else {
            // สร้างใหม่ (กรณีเจ้าของใหม่ หรือเจ้าของจากวันก่อน)
            const { data: ownerData, error: ownerErr } = await supabase
                .from('vasd_owner')
                .insert({
                    event_id: eventId,
                    owner_name: pendingSaveData.owner.name,
                    phone:   pendingSaveData.owner.phone   || null,
                    id_card: pendingSaveData.owner.idCard  || null,
                    address: pendingSaveData.owner.address || null
                })
                .select()
                .single();
            if (ownerErr) throw new Error('Owner: ' + ownerErr.message);
            ownerIdToUse = ownerData.id;
            console.log('[Save] Created new owner:', pendingSaveData.owner.name, ownerData.id);
        }

        // 3. หา queue_number ถัดไป
        const { count: existingCount } = await supabase
            .from('vasd_animal')
            .select('*', { count: 'exact', head: true })
            .eq('event_id', eventId);
        let nextQueue = (existingCount || 0) + 1;

        // 4. บันทึกสัตว์ + บริการ + คิว
        const saved = [];
        for (const anim of pendingSaveData.animals) {
            const { data: animalData, error: animErr } = await supabase
                .from('vasd_animal')
                .insert({
                    event_id: eventId,
                    owner_id: ownerIdToUse,
                    queue_number: nextQueue,
                    species: anim.species,
                    animal_name: anim.name,
                    sex: anim.sex,
                    est_weight: anim.estWeight
                })
                .select()
                .single();
            if (animErr) throw new Error('Animal: ' + animErr.message);

            saved.push({ ...animalData, services: anim.services });
            nextQueue++;

            if (anim.services && anim.services.length > 0) {
                const svcRows = anim.services.map(s => ({
                    animal_id: animalData.id,
                    service_type: s,
                    is_done: false
                }));
                const { error: svcErr } = await supabase.from('vasd_service').insert(svcRows);
                if (svcErr) throw new Error('Service: ' + svcErr.message);
            }

            const { error: qErr } = await supabase.from('vasd_queue').insert({
                animal_id: animalData.id,
                status: 'waiting'
            });
            if (qErr) throw new Error('Queue: ' + qErr.message);
        }

        const queueList = saved.map(a => `#${a.queue_number} ${a.animal_name}`).join('\n');
        alert(
            `✅ บันทึกข้อมูลเรียบร้อยแล้ว!\n\n` +
            `เจ้าของ: ${pendingSaveData.owner.name} ${reused ? '(ใช้ข้อมูลเดิม)' : '(เจ้าของใหม่)'}\n` +
            `เพิ่มสัตว์ ${pendingSaveData.animals.length} ตัว:\n${queueList}`
        );
        pendingSaveData = null;
        location.reload();

    } catch (e) {
        console.error('[Save] failed:', e);
        alert("❌ บันทึกไม่สำเร็จ: " + e.message + "\n\nลองใหม่อีกครั้ง");
        btn.disabled = false;
        btn.classList.remove("saving");
        btn.textContent = "📲 ส่งคำขอ Consent ไปยัง iPad";
    }
}

window.addAnimal();
</script>
