<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Live Surgery Monitor – VASD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --navy:        #0b1929;
  --primary:     #3b82f6;
  --primary-light:#60a5fa;
  --teal:        #0ea5a0;
  --teal-light:  #14c4bc;
  --emerald:     #10b981;
  --amber:       #f59e0b;
  --rose:        #ef4444;
  --rose-bright: #dc2626;
  --gray:        #64748b;

  --surface:    rgba(255,255,255,0.04);
  --surface-2:  rgba(255,255,255,0.07);
  --border:     rgba(255,255,255,0.10);
  --text:       #e2e8f0;
  --text-dim:   #94a3b8;
  --text-faint: #475569;

  --radius:    12px;
  --radius-lg: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Sarabun", sans-serif;
  background: var(--navy);
  color: var(--text);
  min-height: 100vh;
  display: flex; flex-direction: column;
  overflow-x: hidden;
}
body::before {
  content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 20% 10%, rgba(59,130,246,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 80% 90%, rgba(239,68,68,0.04) 0%, transparent 60%);
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(11,25,41,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 14px; height: 56px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.brand { display: flex; align-items: center; gap: 8px; }
.brand-logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--rose), var(--rose-bright));
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; box-shadow: 0 0 20px rgba(239,68,68,0.4);
  animation: brandPulse 2s ease-in-out infinite;
}
@keyframes brandPulse {
  0%, 100% { box-shadow: 0 0 20px rgba(239,68,68,0.4); }
  50%      { box-shadow: 0 0 30px rgba(239,68,68,0.7); }
}
.brand-name { font-family: "Outfit", sans-serif; font-size: 14px; font-weight: 800; color: #fff; line-height: 1; }
.brand-sub { font-size: 9px; color: var(--text-dim); margin-top: 2px; letter-spacing: 0.5px; }

.header-stats {
  display: flex; gap: 6px; align-items: center;
  font-family: "Outfit", sans-serif; font-size: 12px;
}
.stat-pill {
  background: var(--surface-2);
  border: 1px solid var(--border);
  padding: 5px 10px; border-radius: 16px;
  display: flex; align-items: center; gap: 4px;
  font-weight: 700; white-space: nowrap;
}
.stat-pill.active { color: var(--teal-light); border-color: rgba(14,165,160,0.4); background: rgba(14,165,160,0.1); }
.stat-pill.crit { color: var(--rose); border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.1); }
.stat-pill.crit.has-crit { animation: critFlash 0.6s ease-in-out infinite; }
@keyframes critFlash {
  0%, 100% { background: rgba(239,68,68,0.1); }
  50%      { background: rgba(239,68,68,0.4); }
}

.btn-sound {
  background: var(--surface-2); color: var(--text);
  border: 1px solid var(--border);
  padding: 6px 10px; border-radius: 9px;
  font-family: "Sarabun", sans-serif; font-size: 11px;
  font-weight: 700; cursor: pointer;
  display: flex; align-items: center; gap: 4px;
  white-space: nowrap;
}
.btn-sound.on { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.4); color: #34d399; }

/* ── MAIN GRID ── */
.wrap {
  position: relative; z-index: 1;
  max-width: 2400px; margin: 0 auto;
  padding: 10px; width: 100%;
  padding-bottom: 74px;
}
.grid {
  display: grid;
  gap: 10px;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
}
.empty-state {
  grid-column: 1 / -1;
  text-align: center; padding: 80px 20px;
  color: var(--text-dim);
}
.empty-state-icon { font-size: 56px; margin-bottom: 12px; opacity: 0.4; }
.empty-state-text { font-size: 15px; }

/* ── CARD ── */
.mon-card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  animation: cardIn 0.4s ease both;
  transition: border-color 0.3s, box-shadow 0.3s;
  display: flex; flex-direction: column;
  cursor: pointer;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.mon-card.status-normal   { border-color: rgba(16,185,129,0.3); }
.mon-card.status-warn     { border-color: rgba(245,158,11,0.5); box-shadow: 0 0 20px rgba(245,158,11,0.1); }
.mon-card.status-critical {
  border-color: var(--rose);
  animation: cardIn 0.4s ease both, critBorder 1s ease-in-out infinite;
}
@keyframes critBorder {
  0%, 100% { box-shadow: 0 0 20px rgba(239,68,68,0.25); border-color: rgba(239,68,68,0.6); }
  50%      { box-shadow: 0 0 40px rgba(239,68,68,0.6); border-color: var(--rose); }
}
.mon-card.status-nodata { border-color: rgba(100,116,139,0.25); opacity: 0.85; }

/* Hero header with big table number */
.mc-header {
  padding: 10px 14px;
  background: linear-gradient(135deg, rgba(59,130,246,0.10), rgba(59,130,246,0.03));
  border-bottom: 2px solid rgba(59,130,246,0.25);
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; min-height: 72px;
}
.mon-card.status-warn     .mc-header { background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(245,158,11,0.03)); border-bottom-color: rgba(245,158,11,0.35); }
.mon-card.status-critical .mc-header { background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(239,68,68,0.05)); border-bottom-color: rgba(239,68,68,0.4); }

.mc-table {
  display: flex; align-items: baseline;
  gap: 8px; flex: 1; min-width: 0;
  font-family: "Outfit", sans-serif;
}
.mc-table-label {
  font-size: 16px; font-weight: 700;
  color: var(--text-dim);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  flex-shrink: 0;
}
.mc-table-num {
  font-size: 56px;
  font-weight: 900;
  line-height: 1;
  letter-spacing: -3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  filter: drop-shadow(0 2px 8px rgba(96,165,250,0.5));
}
.mon-card.status-warn     .mc-table-num { background: linear-gradient(135deg, #fcd34d, var(--amber)); -webkit-background-clip: text; background-clip: text; filter: drop-shadow(0 2px 8px rgba(245,158,11,0.5)); }
.mon-card.status-critical .mc-table-num { background: linear-gradient(135deg, #fca5a5, var(--rose)); -webkit-background-clip: text; background-clip: text; filter: drop-shadow(0 2px 10px rgba(239,68,68,0.6)); }
.mon-card.status-nodata   .mc-table-num { background: linear-gradient(135deg, #94a3b8, var(--gray)); -webkit-background-clip: text; background-clip: text; filter: none; }

.mc-elapsed {
  font-family: "Outfit", sans-serif;
  font-size: 16px; font-weight: 700;
  color: var(--text-dim);
  display: flex; flex-direction: column; align-items: flex-end;
  gap: 2px; flex-shrink: 0;
}
.mc-elapsed-icon { font-size: 14px; opacity: 0.7; }
.mc-elapsed-val { font-size: 18px; letter-spacing: -0.5px; }

/* Animal info */
.mc-animal {
  padding: 8px 12px;
  background: rgba(0,0,0,0.15);
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border);
}
.mc-q {
  font-family: "Outfit", sans-serif;
  font-size: 11px; font-weight: 800;
  width: 30px; height: 30px;
  background: rgba(59,130,246,0.15);
  border: 1px solid rgba(59,130,246,0.4);
  color: var(--primary);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.mc-animal-info { flex: 1; min-width: 0; }
.mc-animal-name {
  font-family: "Outfit", sans-serif;
  font-size: 15px; font-weight: 800; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.1;
}
.mc-animal-meta {
  font-size: 10px; color: var(--text-dim); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.mc-staff {
  font-size: 10px; color: var(--text-dim);
  padding: 5px 12px;
  background: rgba(0,0,0,0.1);
  border-bottom: 1px solid var(--border);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.mc-staff b { color: var(--text); font-weight: 600; }

/* Vitals (with sparkline) */
.vitals {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
}
.vital {
  background: var(--surface);
  padding: 10px 8px 4px;
  display: flex; flex-direction: column; align-items: center;
  position: relative;
  transition: background 0.3s;
  min-height: 116px;
}
.vital.v-normal   { background: rgba(16,185,129,0.06); }
.vital.v-warn     { background: rgba(245,158,11,0.10); }
.vital.v-critical { background: rgba(239,68,68,0.15); animation: vitalCrit 1s ease-in-out infinite; }
.vital.v-nodata   { background: rgba(100,116,139,0.05); }
@keyframes vitalCrit {
  0%, 100% { background: rgba(239,68,68,0.15); }
  50%      { background: rgba(239,68,68,0.35); }
}

.vital-icon {
  font-size: 20px; line-height: 1;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
  margin-top: 2px;
}
.vital-icon.heart { animation: heartbeat var(--hr-dur, 1s) infinite ease-in-out; }
@keyframes heartbeat {
  0%, 50%, 100% { transform: scale(1); }
  20% { transform: scale(1.35); }
  35% { transform: scale(1); }
}
.vital-icon.lungs { animation: breathe var(--rr-dur, 3s) infinite ease-in-out; }
@keyframes breathe {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50%      { transform: scale(1.2); opacity: 1; }
}
.vital-icon.spo2 { animation: dropFall 2.5s infinite ease-in-out; }
@keyframes dropFall {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(2px); }
}
.vital-icon.temp.v-cold { color: #60a5fa; }
.vital-icon.temp.v-hot  { animation: tempShake 0.5s infinite ease-in-out; }
@keyframes tempShake {
  0%, 100% { transform: rotate(0deg); }
  25%      { transform: rotate(-8deg); }
  75%      { transform: rotate(8deg); }
}

.vital-value {
  font-family: "Outfit", sans-serif;
  font-size: 26px; font-weight: 900;
  color: #fff; line-height: 1;
  letter-spacing: -0.5px;
  margin-top: 4px;
  transition: color 0.3s;
}
.vital-value .sub { font-size: 14px; }
.vital.v-normal   .vital-value { color: #6ee7b7; }
.vital.v-warn     .vital-value { color: #fcd34d; }
.vital.v-critical .vital-value { color: #fca5a5; text-shadow: 0 0 10px rgba(252,165,165,0.5); }
.vital.v-nodata   .vital-value { color: var(--text-faint); }

.vital-unit {
  font-size: 9px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
  margin-top: 2px;
}
.vital-label {
  font-size: 9px; font-weight: 700;
  color: var(--text-dim); letter-spacing: 1px;
  text-transform: uppercase;
  position: absolute; top: 5px; left: 8px;
}

/* ★ Sparkline */
.sparkline {
  width: 100%;
  height: 22px;
  margin-top: 4px;
  display: block;
}
.sparkline-empty {
  font-size: 8px; color: var(--text-faint);
  text-anchor: middle;
}

.mc-footer {
  padding: 6px 10px;
  background: var(--surface-2);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 10px;
}
.status-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 14px;
  font-family: "Outfit", sans-serif; font-size: 10px; font-weight: 800;
  letter-spacing: 0.5px;
}
.status-pill.normal   { background: rgba(16,185,129,0.15);  color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
.status-pill.warn     { background: rgba(245,158,11,0.15);  color: #fbbf24; border: 1px solid rgba(245,158,11,0.4); }
.status-pill.critical { background: rgba(239,68,68,0.2);    color: #fca5a5; border: 1px solid var(--rose); animation: pillBlink 0.5s infinite alternate; }
.status-pill.nodata   { background: rgba(100,116,139,0.15); color: var(--text-dim); border: 1px solid rgba(100,116,139,0.3); }
@keyframes pillBlink {
  from { opacity: 1; }
  to   { opacity: 0.55; }
}
.last-update { color: var(--text-faint); font-family: "Outfit", sans-serif; font-size: 10px; }

.mc-note {
  padding: 6px 12px;
  background: rgba(245,158,11,0.08);
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--amber);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Modal (big trend charts) ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  display: none;
  align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.show { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-box {
  background: var(--navy);
  border: 2px solid var(--primary);
  border-radius: 20px;
  max-width: 1000px; width: 100%; max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  animation: modalIn 0.3s ease;
}
@keyframes modalIn {
  from { transform: scale(0.9); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

.modal-header {
  padding: 16px 20px;
  background: var(--surface-2);
  border-bottom: 2px solid var(--primary);
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; z-index: 1;
  background: rgba(11,25,41,0.95);
  backdrop-filter: blur(10px);
}
.modal-title {
  font-family: "Outfit", sans-serif;
  font-size: 22px; font-weight: 800; color: #fff;
}
.modal-title .table-mark {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  font-weight: 900;
}
.modal-close {
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  width: 36px; height: 36px;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  font-weight: 700;
}
.modal-close:hover { background: var(--rose); }

.modal-body { padding: 20px; }
.big-charts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media (max-width: 600px) { .big-charts { grid-template-columns: 1fr; } }

.big-chart {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
}
.big-chart-title {
  font-family: "Outfit", sans-serif;
  font-size: 14px; font-weight: 700;
  color: var(--text-dim);
  margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: baseline;
}
.big-chart-current {
  font-size: 24px; font-weight: 900;
  color: #fff;
}
.big-chart-svg { width: 100%; height: 140px; display: block; }

.modal-meta {
  display: flex; flex-wrap: wrap; gap: 12px;
  font-size: 13px;
  padding-bottom: 16px;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.modal-meta-item { color: var(--text-dim); }
.modal-meta-item b { color: var(--text); font-weight: 600; }

/* Bottom nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: 56px;
  background: rgba(11,25,41,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border); z-index: 200;
  display: flex; justify-content: space-around; align-items: center;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  color: var(--text-dim); text-decoration: none;
  font-size: 9px; font-weight: 600;
}
.nav-item.active { color: var(--rose); }
.nav-icon { font-size: 18px; }

/* Alert banner */
#alertBanner {
  position: fixed; top: 64px; left: 50%; transform: translateX(-50%);
  background: linear-gradient(135deg, var(--rose-bright), var(--rose));
  color: #fff; padding: 10px 18px; border-radius: 10px;
  font-weight: 700; font-size: 13px;
  box-shadow: 0 10px 30px rgba(239,68,68,0.5);
  z-index: 500; display: none;
  max-width: 90%;
  animation: alertSlide 0.4s ease;
}
#alertBanner.show { display: block; }
@keyframes alertSlide {
  from { transform: translate(-50%, -100px); opacity: 0; }
  to   { transform: translate(-50%, 0); opacity: 1; }
}

/* RESPONSIVE */
@media (min-width: 600px) and (max-width: 1279px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
  .vital-value { font-size: 30px; }
  .vital-icon { font-size: 22px; }
  .vital { min-height: 120px; }
  .mc-table-num { font-size: 60px; }
}
@media (min-width: 1280px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
}
@media (min-width: 1600px) {
  .grid { grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .mc-header { min-height: 84px; padding: 12px 16px; }
  .mc-table-num { font-size: 68px; letter-spacing: -4px; }
  .mc-table-label { font-size: 17px; }
  .mc-elapsed-val { font-size: 20px; }
  .sparkline { height: 26px; }
  .vital { min-height: 124px; }
}
@media (min-width: 2000px) {
  .grid { grid-template-columns: repeat(6, 1fr); }
  .mc-table-num { font-size: 76px; }
  .vital-value { font-size: 34px; }
  .vital { min-height: 138px; }
  .vital-icon { font-size: 26px; }
  .sparkline { height: 30px; }
}
@media (max-width: 599px) {
  .grid { gap: 10px; grid-template-columns: 1fr; }
  .vital { min-height: 130px; padding: 12px 10px 6px; }
  .vital-icon { font-size: 24px; }
  .vital-value { font-size: 32px; }
  .vital-value .sub { font-size: 17px; }
  .mc-animal-name { font-size: 16px; }
  .mc-table-num { font-size: 72px; letter-spacing: -4px; }
  .mc-table-label { font-size: 18px; }
  .mc-header { min-height: 90px; padding: 12px 16px; }
  .mc-elapsed-val { font-size: 20px; }
  .sparkline { height: 32px; }
  .header-stats { font-size: 11px; }
  .brand-sub { display: none; }
  .modal-body { padding: 14px; }
  .big-chart-svg { height: 120px; }
}
@media (max-width: 380px) {
  .stat-pill { padding: 4px 7px; font-size: 10px; }
  .btn-sound { padding: 5px 8px; font-size: 10px; }
  .mc-table-num { font-size: 64px; }
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo">🩺</div>
    <div>
      <div class="brand-name">Live Surgery Monitor</div>
      <div class="brand-sub">Real-time Vital Signs Dashboard</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-pill active" id="statActive">🛏️ <span id="cntActive">0</span></div>
    <div class="stat-pill crit" id="statCrit">⚠️ <span id="cntCrit">0</span></div>
    <button class="btn-sound" id="btnSound" onclick="toggleSound()">🔇 เสียง</button>
  </div>
</header>

<div id="alertBanner"></div>

<div class="wrap">
  <div id="grid" class="grid">
    <div class="empty-state">
      <div class="empty-state-icon">⏳</div>
      <div class="empty-state-text">กำลังโหลดข้อมูล...</div>
    </div>
  </div>
</div>

<!-- Modal for detailed trend charts -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">โต๊ะ —</div>
      <button class="modal-close" onclick="closeModal()">✖</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script type="module">
import { supabase } from "./js/supabase.js";

const VITAL_RANGES = {
  'ส': {
    hr:   { critLow: 50,  warnLow: 60,   warnHigh: 180,   critHigh: 220 },
    rr:   { critLow: 5,   warnLow: 8,    warnHigh: 30,    critHigh: 50 },
    spo2: { critLow: 90,  warnLow: 95,   warnHigh: 101,   critHigh: 102 },
    temp: { critLow: 95.0, warnLow: 97.7, warnHigh: 103.1, critHigh: 105.8 }
  },
  'ม': {
    hr:   { critLow: 80,  warnLow: 100,  warnHigh: 200,   critHigh: 230 },
    rr:   { critLow: 5,   warnLow: 10,   warnHigh: 30,    critHigh: 50 },
    spo2: { critLow: 90,  warnLow: 95,   warnHigh: 101,   critHigh: 102 },
    temp: { critLow: 95.0, warnLow: 97.7, warnHigh: 103.1, critHigh: 105.8 }
  }
};

const STATUS_COLOR = {
  normal:   '#34d399',
  warn:     '#fbbf24',
  critical: '#fca5a5',
  nodata:   '#64748b'
};

let lastStatus = {};
let lastReloadAt = 0;
let audioContext = null;
let soundEnabled = false;
let currentData = [];  // cache สำหรับ modal

// ═══════════════════════════════════════════
// Audio
// ═══════════════════════════════════════════
async function ensureAudio() {
  if (!audioContext) {
    try { audioContext = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  if (audioContext.state === 'suspended') {
    try { await audioContext.resume(); } catch (e) {}
  }
  return audioContext;
}

window.toggleSound = async function() {
  const btn = document.getElementById('btnSound');
  if (!soundEnabled) {
    const ctx = await ensureAudio();
    if (!ctx || ctx.state !== 'running') {
      alert('⚠️ ไม่สามารถเปิดเสียงได้');
      return;
    }
    playBeep(880, 0.15, 0.2);
    soundEnabled = true;
    btn.className = 'btn-sound on';
    btn.innerHTML = '🔊 เสียงเปิด';
  } else {
    soundEnabled = false;
    btn.className = 'btn-sound';
    btn.innerHTML = '🔇 เสียง';
  }
};

function playBeep(freq, duration, volume = 0.3) {
  if (!audioContext || audioContext.state !== 'running') return;
  try {
    const t = audioContext.currentTime;
    const o = audioContext.createOscillator();
    const g = audioContext.createGain();
    o.connect(g).connect(audioContext.destination);
    o.frequency.value = freq; o.type = 'sine';
    g.gain.setValueAtTime(volume, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + duration);
    o.start(t); o.stop(t + duration);
  } catch (e) {}
}
function playAlarmSiren() {
  if (!soundEnabled || !audioContext || audioContext.state !== 'running') return;
  for (let i = 0; i < 3; i++) setTimeout(() => playBeep(1000, 0.2, 0.4), i * 250);
}

// ═══════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function evalVital(value, range) {
  const v = parseFloat(value);
  if (isNaN(v) || value === '' || value == null) return { status: 'nodata', value: null };
  if (v <= range.critLow || v >= range.critHigh) return { status: 'critical', value: v };
  if (v <= range.warnLow || v >= range.warnHigh) return { status: 'warn', value: v };
  return { status: 'normal', value: v };
}

function rankStatus(...statuses) {
  if (statuses.includes('critical')) return 'critical';
  if (statuses.includes('warn'))     return 'warn';
  if (statuses.includes('normal'))   return 'normal';
  return 'nodata';
}

function getSortedVitals(vitals) {
  if (!vitals || vitals.length === 0) return [];
  return [...vitals].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
}

function getLatestVital(sortedVitals) {
  return sortedVitals.length > 0 ? sortedVitals[sortedVitals.length - 1] : null;
}

function formatElapsed(startStr) {
  if (!startStr) return '--:--';
  const ms = Date.now() - new Date(startStr).getTime();
  if (ms < 0) return '--:--';
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function formatRelative(dateStr) {
  if (!dateStr) return '-';
  const sec = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
  if (sec < 60)   return `${sec}s`;
  if (sec < 3600) return `${Math.floor(sec/60)}m`;
  return `${Math.floor(sec/3600)}h`;
}

// ═══════════════════════════════════════════
// ★ SPARKLINE RENDERER (mini SVG line chart)
// ═══════════════════════════════════════════
function renderSparkline(values, status, options = {}) {
  const nums = values.map(v => parseFloat(v)).filter(v => !isNaN(v));
  const W = 100, H = 30, PAD = 3;

  if (nums.length === 0) {
    return `<svg class="sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><text x="${W/2}" y="${H/2+3}" class="sparkline-empty">no data</text></svg>`;
  }
  if (nums.length === 1) {
    // Single dot in middle
    const color = STATUS_COLOR[status];
    return `<svg class="sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <line x1="0" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="${color}" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
      <circle cx="${W/2}" cy="${H/2}" r="3" fill="${color}"/>
    </svg>`;
  }

  let min = Math.min(...nums);
  let max = Math.max(...nums);
  if (max - min < 0.5) { min -= 0.5; max += 0.5; }   // avoid flatline
  const range = max - min;

  const pts = nums.map((v, i) => {
    const x = (i / (nums.length - 1)) * (W - PAD * 2) + PAD;
    const y = H - PAD - ((v - min) / range) * (H - PAD * 2);
    return [x, y];
  });

  const pathD = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const last = pts[pts.length - 1];
  const areaD = `${pathD} L ${last[0].toFixed(1)},${H - PAD} L ${PAD},${H - PAD} Z`;
  const color = STATUS_COLOR[status];

  return `<svg class="sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${areaD}" fill="${color}" fill-opacity="0.15"/>
    <path d="${pathD}" stroke="${color}" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.5" fill="${color}"/>
  </svg>`;
}

// ═══════════════════════════════════════════
// ★ BIG CHART (for modal)
// ═══════════════════════════════════════════
function renderBigChart(rows, vitalKey, ranges, label, unit, color) {
  if (!rows || rows.length === 0) {
    return `<div class="big-chart">
      <div class="big-chart-title"><span>${label}</span></div>
      <div style="text-align:center; padding:40px 0; color:var(--text-faint); font-size:13px;">ยังไม่มีข้อมูล</div>
    </div>`;
  }

  const points = rows.map(r => ({ v: parseFloat(r[vitalKey]), t: new Date(r.created_at) }))
                    .filter(p => !isNaN(p.v));

  if (points.length === 0) {
    return `<div class="big-chart">
      <div class="big-chart-title"><span>${label}</span></div>
      <div style="text-align:center; padding:40px 0; color:var(--text-faint); font-size:13px;">ยังไม่มีข้อมูล ${label}</div>
    </div>`;
  }

  const W = 500, H = 140, PADL = 38, PADR = 12, PADT = 10, PADB = 22;

  // Range includes normal band
  const candidates = [...points.map(p => p.v)];
  if (ranges) {
    candidates.push(ranges.warnLow, ranges.warnHigh);
  }
  let yMin = Math.min(...candidates);
  let yMax = Math.max(...candidates);
  const pad = (yMax - yMin) * 0.1 || 1;
  yMin -= pad; yMax += pad;
  const yRange = yMax - yMin;

  const t0 = points[0].t.getTime();
  const tN = points[points.length - 1].t.getTime();
  const tRange = (tN - t0) || 1;

  function xOf(t) { return PADL + ((t.getTime() - t0) / tRange) * (W - PADL - PADR); }
  function yOf(v) { return H - PADB - ((v - yMin) / yRange) * (H - PADT - PADB); }

  // Build path
  const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${xOf(p.t).toFixed(1)},${yOf(p.v).toFixed(1)}`).join(' ');
  const lastP = points[points.length - 1];
  const areaPath = `${linePath} L ${xOf(lastP.t).toFixed(1)},${H - PADB} L ${PADL},${H - PADB} Z`;

  // Normal band
  let bandSvg = '';
  if (ranges) {
    const yWLow  = Math.min(yOf(ranges.warnLow),  H - PADB);
    const yWHigh = Math.max(yOf(ranges.warnHigh), PADT);
    bandSvg = `<rect x="${PADL}" y="${yWHigh}" width="${W - PADL - PADR}" height="${yWLow - yWHigh}" fill="${STATUS_COLOR.normal}" fill-opacity="0.08"/>`;
  }

  // Y-axis ticks (3 ticks)
  const yTicks = [yMin, (yMin + yMax) / 2, yMax].map(v => {
    const y = yOf(v).toFixed(1);
    return `<line x1="${PADL}" y1="${y}" x2="${W-PADR}" y2="${y}" stroke="var(--border)" stroke-width="0.5"/>
            <text x="${PADL - 4}" y="${y}" text-anchor="end" dominant-baseline="central" fill="var(--text-dim)" font-size="9" font-family="Outfit, monospace">${v.toFixed(0)}</text>`;
  }).join('');

  // X-axis time labels
  const formatTime = d => d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
  const xLabels = [points[0].t, points[Math.floor(points.length/2)].t, lastP.t].map(t => {
    const x = xOf(t).toFixed(1);
    return `<text x="${x}" y="${H - 4}" text-anchor="middle" fill="var(--text-faint)" font-size="9" font-family="Outfit, monospace">${formatTime(t)}</text>`;
  }).join('');

  // Data points
  const dots = points.map(p => `<circle cx="${xOf(p.t).toFixed(1)}" cy="${yOf(p.v).toFixed(1)}" r="2" fill="${color}"/>`).join('');

  const lastVal = lastP.v;
  const lastStatus = ranges
    ? (lastVal <= ranges.critLow || lastVal >= ranges.critHigh ? 'critical'
      : lastVal <= ranges.warnLow || lastVal >= ranges.warnHigh ? 'warn'
      : 'normal')
    : 'normal';
  const lastColor = STATUS_COLOR[lastStatus];

  return `<div class="big-chart">
    <div class="big-chart-title">
      <span>${label} ${unit}</span>
      <span class="big-chart-current" style="color:${lastColor};">${lastVal}${unit ? `<span style="font-size:14px;color:var(--text-dim);"> ${unit}</span>` : ''}</span>
    </div>
    <svg class="big-chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      ${bandSvg}
      ${yTicks}
      <path d="${areaPath}" fill="${color}" fill-opacity="0.12"/>
      <path d="${linePath}" stroke="${color}" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
      ${dots}
      <circle cx="${xOf(lastP.t).toFixed(1)}" cy="${yOf(lastVal).toFixed(1)}" r="4" fill="${lastColor}" stroke="#fff" stroke-width="1"/>
      ${xLabels}
    </svg>
    <div style="margin-top:6px; font-size:10px; color:var(--text-faint); font-family:'Outfit',monospace;">
      ${points.length} จุด · ${formatTime(points[0].t)} – ${formatTime(lastP.t)}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
// Modal
// ═══════════════════════════════════════════
window.openCardModal = function(animalId) {
  const q = currentData.find(x => x.vasd_animal && x.vasd_animal.id === animalId);
  if (!q) return;
  const a = q.vasd_animal;
  const ranges = VITAL_RANGES[a.species] || VITAL_RANGES['ส'];
  const rows = getSortedVitals(a.vasd_vital_signs);

  const speciesText = a.species === 'ส' ? '🐶 สุนัข' : '🐱 แมว';
  document.getElementById('modalTitle').innerHTML = `
    <span class="table-mark">โต๊ะ ${escapeHtml(q.operating_table || '—')}</span>
    &nbsp;·&nbsp; #${a.queue_number || '-'} ${escapeHtml(a.animal_name)}
  `;

  const body = document.getElementById('modalBody');
  body.innerHTML = `
    <div class="modal-meta">
      <div class="modal-meta-item">${speciesText}</div>
      <div class="modal-meta-item">เพศ <b>${escapeHtml(a.sex || '-')}</b></div>
      <div class="modal-meta-item">นน. <b>${a.actual_weight || '-'} kg</b></div>
      <div class="modal-meta-item">🩺 <b>${escapeHtml(q.surgeon_name || '-')}</b></div>
      <div class="modal-meta-item">💉 <b>${escapeHtml(q.anesthetist || '-')}</b></div>
    </div>
    <div class="big-charts">
      ${renderBigChart(rows, 'hr',   ranges.hr,   'HR (Heart Rate)',  'bpm',  STATUS_COLOR.normal)}
      ${renderBigChart(rows, 'rr',   ranges.rr,   'RR (Resp. Rate)',  '/นาที', STATUS_COLOR.normal)}
      ${renderBigChart(rows, 'spo2', ranges.spo2, 'SpO₂',             '%',    STATUS_COLOR.normal)}
      ${renderBigChart(rows, 'temp', ranges.temp, 'Temperature',      '°F',   STATUS_COLOR.normal)}
    </div>
    <div style="text-align:center; margin-top:14px; font-size:11px; color:var(--text-faint);">
      💡 พื้นที่สีเขียวจางคือช่วงค่าปกติ
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('show');
};

window.closeModal = function(ev) {
  if (ev && ev.target.id !== 'modalOverlay' && ev.type === 'click') return;
  document.getElementById('modalOverlay').classList.remove('show');
};

// ปิด modal ด้วย Esc
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ═══════════════════════════════════════════
// Render Card
// ═══════════════════════════════════════════
function renderCard(q) {
  const a = q.vasd_animal;
  if (!a) return '';

  const species = a.species;
  const ranges = VITAL_RANGES[species] || VITAL_RANGES['ส'];
  const speciesIcon = species === 'ส' ? '🐶' : '🐱';
  const tableNum = q.operating_table ? escapeHtml(q.operating_table) : '—';

  const sortedVitals = getSortedVitals(a.vasd_vital_signs);
  const vital = getLatestVital(sortedVitals);

  // ★ ดึงประวัติย้อนหลัง (ล่าสุด 20 จุด) สำหรับ sparkline
  const last20 = sortedVitals.slice(-20);
  const hrHist   = last20.map(v => v.hr);
  const rrHist   = last20.map(v => v.rr);
  const spo2Hist = last20.map(v => v.spo2);
  const tempHist = last20.map(v => v.temp);

  let cardStatus = 'nodata';
  let hr = { status: 'nodata', value: null };
  let rr = { status: 'nodata', value: null };
  let spo2 = { status: 'nodata', value: null };
  let temp = { status: 'nodata', value: null };
  let updateTime = '';
  let noteText = '';

  if (vital) {
    hr   = evalVital(vital.hr,   ranges.hr);
    rr   = evalVital(vital.rr,   ranges.rr);
    spo2 = evalVital(vital.spo2, ranges.spo2);
    temp = evalVital(vital.temp, ranges.temp);
    cardStatus = rankStatus(hr.status, rr.status, spo2.status, temp.status);
    updateTime = formatRelative(vital.created_at);
    noteText = vital.note || '';
  }

  const hrDur = (hr.value && hr.value > 0) ? Math.max(0.25, 60 / hr.value).toFixed(2) + 's' : '1s';
  const rrDur = (rr.value && rr.value > 0) ? Math.max(0.5,  60 / rr.value).toFixed(2) + 's' : '3s';

  let tempClass = '';
  if (temp.status !== 'nodata' && temp.value != null) {
    if (temp.value < ranges.temp.warnLow)  tempClass = 'v-cold';
    if (temp.value > ranges.temp.warnHigh) tempClass = 'v-hot';
  }

  const statusLabel = {
    normal:   '🟢 NORMAL',
    warn:     '🟡 WARN',
    critical: '🔴 CRITICAL',
    nodata:   '⚪ WAITING'
  }[cardStatus];

  const tempDisplay = temp.value != null ? temp.value.toFixed(1) : '—';

  const staffLine = (q.surgeon_name || q.anesthetist)
    ? `🩺 <b>${escapeHtml(q.surgeon_name || '-')}</b> · 💉 <b>${escapeHtml(q.anesthetist || '-')}</b>`
    : `<span style="color:var(--text-faint);">ยังไม่ระบุทีม</span>`;

  return `
    <div class="mon-card status-${cardStatus}" data-animal-id="${a.id}" onclick="openCardModal('${a.id}')">
      <div class="mc-header">
        <div class="mc-table">
          <span class="mc-table-label">โต๊ะ</span>
          <span class="mc-table-num">${tableNum}</span>
        </div>
        <div class="mc-elapsed">
          <span class="mc-elapsed-icon">⏱️ เวลาที่ใช้</span>
          <span class="mc-elapsed-val elapsed-val" data-start="${q.updated_at || ''}">--:--</span>
        </div>
      </div>

      <div class="mc-animal">
        <div class="mc-q">#${a.queue_number || '-'}</div>
        <div class="mc-animal-info">
          <div class="mc-animal-name">${speciesIcon} ${escapeHtml(a.animal_name)}</div>
          <div class="mc-animal-meta">${escapeHtml(a.sex || '-')} · ${a.actual_weight || '-'} kg</div>
        </div>
      </div>

      <div class="mc-staff">${staffLine}</div>

      <div class="vitals">
        <div class="vital v-${hr.status}">
          <span class="vital-label">HR</span>
          <span class="vital-icon heart" style="--hr-dur: ${hrDur};">❤️</span>
          <span class="vital-value">${hr.value != null ? hr.value : '—'}</span>
          <span class="vital-unit">bpm</span>
          ${renderSparkline(hrHist, hr.status)}
        </div>
        <div class="vital v-${rr.status}">
          <span class="vital-label">RR</span>
          <span class="vital-icon lungs" style="--rr-dur: ${rrDur};">🫁</span>
          <span class="vital-value">${rr.value != null ? rr.value : '—'}</span>
          <span class="vital-unit">/ นาที</span>
          ${renderSparkline(rrHist, rr.status)}
        </div>
        <div class="vital v-${spo2.status}">
          <span class="vital-label">SpO₂</span>
          <span class="vital-icon spo2">💧</span>
          <span class="vital-value">${spo2.value != null ? spo2.value : '—'}<span class="sub">%</span></span>
          <span class="vital-unit">oxygen</span>
          ${renderSparkline(spo2Hist, spo2.status)}
        </div>
        <div class="vital v-${temp.status}">
          <span class="vital-label">TEMP</span>
          <span class="vital-icon temp ${tempClass}">🌡️</span>
          <span class="vital-value">${tempDisplay}<span class="sub">°F</span></span>
          <span class="vital-unit">fahrenheit</span>
          ${renderSparkline(tempHist, temp.status)}
        </div>
      </div>

      ${noteText ? `<div class="mc-note">📝 ${escapeHtml(noteText)}</div>` : ''}

      <div class="mc-footer">
        <span class="status-pill ${cardStatus}">${statusLabel}</span>
        <span class="last-update">${updateTime || 'รอข้อมูล'}</span>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════
// Load
// ═══════════════════════════════════════════
async function loadMonitor() {
  const now = Date.now();
  if (now - lastReloadAt < 500) return;
  lastReloadAt = now;

  try {
    const { data, error } = await supabase
      .from('vasd_queue')
      .select(`
        id, animal_id, status, operating_table, surgeon_name, anesthetist, updated_at,
        vasd_animal(id, queue_number, animal_name, species, sex, actual_weight,
          vasd_vital_signs(id, hr, rr, spo2, temp, zoletil_top, note, created_at)
        )
      `)
      .eq('status', 'surgery')
      .order('operating_table', { ascending: true, nullsFirst: false })
      .order('updated_at', { ascending: true });

    if (error) throw error;

    const queues = (data || []).filter(q => q.vasd_animal);
    currentData = queues;  // cache สำหรับ modal
    const grid = document.getElementById('grid');

    if (queues.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">✅</div>
          <div class="empty-state-text">ไม่มีเคสกำลังผ่าตัดในขณะนี้</div>
        </div>`;
      document.getElementById('cntActive').textContent = '0';
      document.getElementById('cntCrit').textContent = '0';
      document.getElementById('statCrit').classList.remove('has-crit');
      return;
    }

    grid.innerHTML = queues.map(renderCard).join('');

    let critCount = 0;
    queues.forEach(q => {
      const a = q.vasd_animal;
      if (!a) return;
      const ranges = VITAL_RANGES[a.species] || VITAL_RANGES['ส'];
      const sorted = getSortedVitals(a.vasd_vital_signs);
      const v = getLatestVital(sorted);
      let status = 'nodata';
      if (v) {
        const s = [
          evalVital(v.hr,   ranges.hr).status,
          evalVital(v.rr,   ranges.rr).status,
          evalVital(v.spo2, ranges.spo2).status,
          evalVital(v.temp, ranges.temp).status
        ];
        status = rankStatus(...s);
      }
      const prev = lastStatus[a.id];
      if (status === 'critical') {
        critCount++;
        if (prev !== 'critical') triggerAlarm(a, q);
      }
      lastStatus[a.id] = status;
    });

    document.getElementById('cntActive').textContent = queues.length;
    document.getElementById('cntCrit').textContent = critCount;
    document.getElementById('statCrit').classList.toggle('has-crit', critCount > 0);

  } catch (e) {
    console.error('[Monitor] load failed', e);
    document.getElementById('grid').innerHTML =
      `<div class="empty-state"><div class="empty-state-icon">❌</div><div class="empty-state-text">โหลดข้อมูลไม่สำเร็จ: ${e.message}</div></div>`;
  }
}

function triggerAlarm(animal, queue) {
  console.warn('[ALARM]', animal.animal_name, 'is CRITICAL');
  playAlarmSiren();
  showBanner(`🚨 CRITICAL: ${animal.animal_name} (${queue.operating_table ? 'โต๊ะ ' + queue.operating_table : 'ไม่ระบุโต๊ะ'})`);
}

function showBanner(text) {
  const b = document.getElementById('alertBanner');
  b.textContent = text;
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 8000);
}

setInterval(() => {
  document.querySelectorAll('.elapsed-val').forEach(el => {
    const start = el.dataset.start;
    if (start) el.textContent = formatElapsed(start);
  });
}, 1000);

supabase.channel('monitor-live')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'vasd_vital_signs' }, loadMonitor)
  .on('postgres_changes', { event: '*', schema: 'public', table: 'vasd_queue' }, loadMonitor)
  .subscribe();

loadMonitor();
setInterval(loadMonitor, 10000);
</script>

<script type="module" src="./js/global-alarm.js"></script>
