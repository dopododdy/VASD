<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ระบบเรียกคิว – VASD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Prompt:wght@400;500;600;700&family=Kanit:wght@400;500;600;700&family=Mitr:wght@400;500;600;700&family=Mali:wght@400;500;600;700&family=Bai+Jamjuree:wght@400;500;600;700&family=Charm:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --navy:       #0b1929;
  --teal:       #0ea5a0;
  --teal-light: #14c4bc;
  --teal-glow:  rgba(14,165,160,0.4);
  --primary:    #3b82f6;
  --primary-light: #60a5fa;
  --violet:     #8b5cf6;
  --emerald:    #10b981;
  --amber:      #f59e0b;
  --rose:       #ef4444;

  --surface:    rgba(255,255,255,0.04);
  --surface-2:  rgba(255,255,255,0.07);
  --surface-3:  rgba(255,255,255,0.11);
  --border:     rgba(255,255,255,0.10);
  --text:       #e2e8f0;
  --text-dim:   #94a3b8;
  --text-faint: #475569;

  --radius:    12px;
  --radius-lg: 20px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: "Sarabun", sans-serif;
  background: var(--navy); color: var(--text);
  min-height: 100vh; width: 100%;
  overflow-x: hidden;
}
body::before {
  content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 20% 10%, rgba(14,165,160,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 80% 90%, rgba(59,130,246,0.06) 0%, transparent 60%);
}

header {
  position: -webkit-sticky;
  position: sticky; top: 0; z-index: 200;
  background: rgba(11,25,41,0.92);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 16px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--teal), var(--teal-light));
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; box-shadow: 0 0 25px var(--teal-glow);
}
.brand-name { font-family: "Sarabun", sans-serif; font-size: 16px; font-weight: 800; color: #fff; line-height: 1; }
.brand-sub { font-size: 10px; color: var(--text-dim); margin-top: 3px; }

.header-right { display: flex; align-items: center; gap: 10px; }
.clock {
  font-family: "Sarabun", sans-serif;
  font-size: 22px; font-weight: 700;
  color: var(--teal-light); letter-spacing: -0.5px;
}
.btn-settings {
  background: var(--surface-2); color: var(--text);
  border: 1px solid var(--border);
  padding: 8px 12px; border-radius: 10px;
  font-family: "Sarabun", sans-serif; font-size: 12px;
  font-weight: 700; cursor: pointer;
  text-decoration: none; display: flex; align-items: center; gap: 4px;
}

.room-bar {
  background: rgba(0,0,0,0.2);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex; gap: 8px; overflow-x: auto;
  scrollbar-width: none;
}
.room-bar::-webkit-scrollbar { display: none; }
.room-btn {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff; border: none;
  padding: 10px 16px; border-radius: 10px;
  font-family: "Sarabun", sans-serif; font-size: 13px;
  font-weight: 700; cursor: pointer;
  white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
  box-shadow: 0 4px 12px rgba(59,130,246,0.3);
  flex-shrink: 0;
  -webkit-transition: 0.2s; transition: 0.2s;
}
.room-btn:hover { -webkit-transform: translateY(-2px); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(59,130,246,0.4); }
.room-btn:active { -webkit-transform: scale(0.97); transform: scale(0.97); }

.wrap {
  position: relative; z-index: 1;
  padding: 16px;
  display: flex; flex-direction: column; gap: 16px;
}

.call-hero {
  display: none;
  background: linear-gradient(135deg, rgba(14,165,160,0.20), rgba(20,196,188,0.10));
  border: 3px solid var(--teal-light);
  border-radius: var(--radius-lg);
  padding: 30px 24px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 60px var(--teal-glow);
  -webkit-animation: heroAppear 0.6s ease both, heroGlow 2s ease-in-out infinite alternate;
  animation: heroAppear 0.6s ease both, heroGlow 2s ease-in-out infinite alternate;
}
.call-hero.show { display: block; }
@-webkit-keyframes heroAppear { from { opacity: 0; -webkit-transform: scale(0.9); } to { opacity: 1; -webkit-transform: scale(1); } }
@keyframes heroAppear { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
@-webkit-keyframes heroGlow {
  from { box-shadow: 0 0 40px rgba(14,165,160,0.4); border-color: var(--teal); }
  to   { box-shadow: 0 0 100px rgba(20,196,188,0.7); border-color: var(--teal-light); }
}
@keyframes heroGlow {
  from { box-shadow: 0 0 40px rgba(14,165,160,0.4); border-color: var(--teal); }
  to   { box-shadow: 0 0 100px rgba(20,196,188,0.7); border-color: var(--teal-light); }
}
.call-hero::before {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(circle at center, transparent 30%, rgba(14,165,160,0.1) 70%);
  pointer-events: none;
}
.call-hero-label {
  font-family: "Sarabun", sans-serif;
  font-size: 18px; font-weight: 700;
  color: var(--teal-light); letter-spacing: 4px;
  text-transform: uppercase; margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
  -webkit-animation: labelBlink 1s ease-in-out infinite;
  animation: labelBlink 1s ease-in-out infinite;
}
@-webkit-keyframes labelBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes labelBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.call-hero-main {
  display: flex; align-items: center; gap: 24px; justify-content: center;
  flex-wrap: wrap;
}
.call-hero-num {
  font-family: "Sarabun", sans-serif;
  font-size: clamp(120px, 22vw, 280px);
  font-weight: 900; line-height: 0.9;
  letter-spacing: -8px;
  background: linear-gradient(135deg, #fff, var(--teal-light));
  -webkit-background-clip: text; background-clip: text;
  color: #fff;
  color: transparent;
  -webkit-filter: drop-shadow(0 4px 20px rgba(20,196,188,0.6));
  filter: drop-shadow(0 4px 20px rgba(20,196,188,0.6));
  -webkit-animation: numPulse 1.5s ease-in-out infinite;
  animation: numPulse 1.5s ease-in-out infinite;
}
@-webkit-keyframes numPulse { 0%, 100% { -webkit-transform: scale(1); } 50% { -webkit-transform: scale(1.05); } }
@keyframes numPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
.call-hero-info { text-align: left; min-width: 0; }
.call-hero-animal {
  font-family: "Sarabun", sans-serif;
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 800; color: #fff; line-height: 1.1;
  word-break: break-word;
}
.call-hero-owner { font-size: clamp(16px, 2.5vw, 26px); color: var(--text-dim); margin-top: 8px; font-weight: 500; }
.call-hero-room {
  margin-top: 16px;
  background: linear-gradient(135deg, var(--amber), #fbbf24);
  color: var(--navy);
  padding: 12px 24px; border-radius: 100px;
  display: inline-flex; align-items: center; gap: 8px;
  font-family: "Sarabun", sans-serif;
  font-size: clamp(22px, 3vw, 40px); font-weight: 800;
  box-shadow: 0 8px 20px rgba(245,158,11,0.4);
  -webkit-animation: roomArrow 1s ease-in-out infinite alternate;
  animation: roomArrow 1s ease-in-out infinite alternate;
}
@-webkit-keyframes roomArrow { from { -webkit-transform: translateX(0); } to { -webkit-transform: translateX(8px); } }
@keyframes roomArrow { from { transform: translateX(0); } to { transform: translateX(8px); } }

.section-title {
  font-family: "Sarabun", sans-serif;
  font-size: 16px; font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-title .count {
  background: var(--surface-3);
  padding: 2px 10px; border-radius: 12px;
  font-size: 14px; color: var(--text);
}

.grid {
  display: grid; gap: 10px;
  -webkit-transition: all 0.3s; transition: all 0.3s;
}
.grid[data-size="lg"] { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
.grid[data-size="md"] { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
.grid[data-size="sm"] { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
.grid[data-size="xs"] { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }

.q-card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 10px;
  text-align: center;
  cursor: pointer;
  -webkit-transition: 0.2s; transition: 0.2s;
  -webkit-animation: cardIn 0.4s ease both;
  animation: cardIn 0.4s ease both;
  position: relative;
  overflow: hidden;
}
@-webkit-keyframes cardIn {
  from { opacity: 0; -webkit-transform: scale(0.8) translateY(10px); }
  to   { opacity: 1; -webkit-transform: scale(1) translateY(0); }
}
@keyframes cardIn {
  from { opacity: 0; transform: scale(0.8) translateY(10px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.q-card:hover {
  border-color: var(--teal);
  background: rgba(14,165,160,0.08);
  -webkit-transform: translateY(-3px); transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(14,165,160,0.2);
}
.q-card:active { -webkit-transform: translateY(-1px); transform: translateY(-1px); }
.q-card.calling {
  background: linear-gradient(135deg, rgba(14,165,160,0.3), rgba(20,196,188,0.2));
  border-color: var(--teal-light);
  -webkit-animation: cardCall 1.2s ease-in-out infinite;
  animation: cardCall 1.2s ease-in-out infinite;
}
@-webkit-keyframes cardCall {
  0%, 100% { box-shadow: 0 0 20px var(--teal-glow); }
  50%      { box-shadow: 0 0 50px rgba(20,196,188,0.8); }
}
@keyframes cardCall {
  0%, 100% { box-shadow: 0 0 20px var(--teal-glow); }
  50%      { box-shadow: 0 0 50px rgba(20,196,188,0.8); }
}

.q-num {
  font-family: "Sarabun", sans-serif;
  font-weight: 900;
  line-height: 1; letter-spacing: -2px;
  background: linear-gradient(135deg, var(--teal-light), var(--teal));
  -webkit-background-clip: text; background-clip: text;
  color: var(--teal-light);
  color: transparent;
  -webkit-filter: drop-shadow(0 2px 6px rgba(20,196,188,0.4));
  filter: drop-shadow(0 2px 6px rgba(20,196,188,0.4));
  margin-bottom: 4px;
}
.grid[data-size="lg"] .q-num { font-size: 90px; }
.grid[data-size="md"] .q-num { font-size: 70px; }
.grid[data-size="sm"] .q-num { font-size: 52px; }
.grid[data-size="xs"] .q-num { font-size: 38px; }

.q-name {
  font-family: "Sarabun", sans-serif;
  font-weight: 800; color: #fff;
  line-height: 1.1;
  white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 2px;
}
.grid[data-size="lg"] .q-name { font-size: 22px; }
.grid[data-size="md"] .q-name { font-size: 18px; }
.grid[data-size="sm"] .q-name { font-size: 14px; }
.grid[data-size="xs"] .q-name { font-size: 12px; }

.q-owner { font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.grid[data-size="sm"] .q-owner,
.grid[data-size="xs"] .q-owner { display: none; }

.empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.empty-icon { font-size: 64px; opacity: 0.5; margin-bottom: 12px; }
.empty-text { font-size: 16px; }
.empty.error { color: var(--rose); }
.empty.error .empty-icon { opacity: 1; }
.empty .empty-detail { font-size: 12px; color: var(--text-faint); margin-top: 8px; max-width: 500px; margin-left: auto; margin-right: auto; word-break: break-word; }

.modal-overlay {
  position: fixed; inset: 0; z-index: 800;
  background: rgba(0,0,0,0.75);
  -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
  display: none;
  align-items: center; justify-content: center;
  padding: 20px;
  -webkit-animation: fadeIn 0.2s ease; animation: fadeIn 0.2s ease;
}
.modal-overlay.show { display: flex; }
@-webkit-keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-box {
  background: var(--navy);
  border: 2px solid var(--teal);
  border-radius: 24px;
  max-width: 480px; width: 100%;
  padding: 24px;
  text-align: center;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  -webkit-animation: modalIn 0.3s ease; animation: modalIn 0.3s ease;
}
@-webkit-keyframes modalIn { from { -webkit-transform: scale(0.85); opacity: 0; } to { -webkit-transform: scale(1); opacity: 1; } }
@keyframes modalIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-title { font-family: "Sarabun", sans-serif; font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 6px; }
.modal-subtitle { font-size: 14px; color: var(--text-dim); margin-bottom: 20px; }
.modal-q-num {
  font-family: "Sarabun", sans-serif;
  font-size: 72px; font-weight: 900;
  background: linear-gradient(135deg, var(--teal-light), var(--teal));
  -webkit-background-clip: text; background-clip: text;
  color: var(--teal-light);
  color: transparent;
  line-height: 1; margin-bottom: 8px;
}
.modal-rooms { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
@media (max-width: 380px) { .modal-rooms { grid-template-columns: 1fr; } }
.modal-room-btn {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff; border: none;
  padding: 16px; border-radius: 12px;
  font-family: "Sarabun", sans-serif; font-size: 16px;
  font-weight: 700; cursor: pointer; transition: 0.2s;
}
.modal-room-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59,130,246,0.4); }
.modal-cancel {
  background: transparent; color: var(--text-dim);
  border: 1px solid var(--border);
  padding: 10px 20px; border-radius: 10px;
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer;
}

#audioPrompt {
  display: none;
  position: fixed; top: 70px; left: 50%;
  -webkit-transform: translateX(-50%); transform: translateX(-50%);
  background: linear-gradient(135deg, var(--amber), #fbbf24);
  color: var(--navy);
  padding: 12px 20px; border-radius: 12px;
  font-weight: 800; font-size: 14px;
  cursor: pointer; z-index: 600;
  box-shadow: 0 10px 30px rgba(245,158,11,0.5);
  -webkit-animation: alertSlide 0.4s ease; animation: alertSlide 0.4s ease;
}
#audioPrompt.show { display: block; }
@-webkit-keyframes alertSlide {
  from { -webkit-transform: translate(-50%, -100px); opacity: 0; }
  to   { -webkit-transform: translate(-50%, 0); opacity: 1; }
}
@keyframes alertSlide {
  from { transform: translate(-50%, -100px); opacity: 0; }
  to   { transform: translate(-50%, 0); opacity: 1; }
}

body.tv-mode .room-bar { display: none; }
body.tv-mode .btn-settings { display: none; }
body.tv-mode header { height: 80px; }
body.tv-mode .brand-name { font-size: 22px; }
body.tv-mode .brand-sub { font-size: 13px; }
body.tv-mode .brand-logo { width: 50px; height: 50px; font-size: 24px; }
body.tv-mode .clock { font-size: 32px; }
body.tv-mode .section-title { font-size: 20px; }
body.tv-mode .section-title .count { font-size: 18px; padding: 4px 14px; }
body.tv-mode .call-hero { padding: 40px 30px; }
body.tv-mode .call-hero-label { font-size: 24px; }
body.tv-mode .grid[data-size="lg"] .q-num { font-size: 110px; }
body.tv-mode .grid[data-size="md"] .q-num { font-size: 84px; }
body.tv-mode .grid[data-size="sm"] .q-num { font-size: 64px; }

/* ── Marquee Bar (แถบอักษรวิ่งด้านล่าง) ─────────────────────── */
.mq-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  overflow: hidden;
  z-index: 100;
  border-top: 2px solid rgba(255,255,255,0.12);
  padding: 12px 0;
  pointer-events: none;
  display: none;
  box-shadow: 0 -8px 30px rgba(0,0,0,0.4);
}
.mq-bar.show { display: block; }

/* ภายในใช้ .mq-content ที่จัด animation/text */
.mq-content {
  display: inline-block;
  white-space: nowrap;
  will-change: transform, opacity;
  line-height: 1.2;
}

/* scroll (default): right → left */
.mq-content.scroll {
  padding-left: 100%;
  animation-name: q-mq-scroll;
  animation-duration: var(--mq-speed, 20s);
  animation-timing-function: linear;
  animation-iteration-count: infinite;
}
.mq-content.scroll.reverse {
  animation-direction: reverse;
}
@keyframes q-mq-scroll {
  0%   { transform: translate3d(0, 0, 0); }
  100% { transform: translate3d(-100%, 0, 0); }
}

/* fixed mode: ข้อความคงที่ตรงกลาง — animation ที่ไม่ใช่ scroll */
.mq-content.fixed {
  display: block;
  width: 100%;
  text-align: center;
  padding-left: 0;
}
.mq-content.slide-up   { animation: q-mq-slide-up var(--mq-speed, 8s) ease-in-out infinite; }
.mq-content.fade-cycle { animation: q-mq-fade     var(--mq-speed, 5s) ease-in-out infinite; }
.mq-content.pulse      { animation: q-mq-pulse    var(--mq-speed, 2s) ease-in-out infinite; }
.mq-content.blink      { animation: q-mq-blink    var(--mq-speed, 1.5s) steps(1) infinite; }

@keyframes q-mq-slide-up {
  0%             { transform: translateY(120%); opacity: 0; }
  15%, 85%       { transform: translateY(0);    opacity: 1; }
  100%           { transform: translateY(-120%); opacity: 0; }
}
@keyframes q-mq-fade {
  0%, 100%       { opacity: 0; }
  20%, 80%       { opacity: 1; }
}
@keyframes q-mq-pulse {
  0%, 100%       { opacity: 1; transform: scale(1); }
  50%            { opacity: 0.5; transform: scale(0.97); }
}
@keyframes q-mq-blink {
  0%, 49%        { opacity: 1; }
  50%, 100%      { opacity: 0; }
}

body.tv-mode .mq-bar { padding: 18px 0; border-top-width: 3px; }

@media (max-width: 600px) {
  .header-right .clock { display: none; }
  .grid[data-size="lg"] .q-num { font-size: 70px; }
  .room-btn { font-size: 12px; padding: 8px 12px; }
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo">📣</div>
    <div>
      <div class="brand-name">ระบบเรียกคิว</div>
      <div class="brand-sub">Queue Calling System</div>
    </div>
  </div>
  <div class="header-right">
    <div class="clock" id="clock">--:--</div>
    <a href="q-setting.html" class="btn-settings">⚙️ ตั้งค่า</a>
  </div>
</header>

<div class="room-bar" id="roomBar"></div>

<div id="audioPrompt">🔊 คลิกที่นี่เพื่อเปิดเสียงเรียก</div>

<div class="wrap">
  <div class="call-hero" id="callHero">
    <div class="call-hero-label"><span>📢</span> ขอเชิญคิว</div>
    <div class="call-hero-main">
      <div class="call-hero-num" id="callNum">—</div>
      <div class="call-hero-info">
        <div class="call-hero-animal" id="callAnimal">—</div>
        <div class="call-hero-owner" id="callOwner">—</div>
        <div class="call-hero-room" id="callRoom"><span>→</span> <span id="callRoomName">—</span></div>
      </div>
    </div>
  </div>

  <div>
    <div class="section-title">
      ⏳ คิวรอตรวจ <span class="count" id="waitingCount">0</span>
    </div>
    <div class="grid" id="grid" data-size="lg">
      <div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">กำลังโหลด...</div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="callModal">
  <div class="modal-box">
    <div class="modal-q-num" id="modalQNum">—</div>
    <div class="modal-title" id="modalTitle">เรียกเข้าห้องตรวจ</div>
    <div class="modal-subtitle" id="modalSubtitle">เลือกห้อง</div>
    <div class="modal-rooms" id="modalRooms"></div>
    <button class="modal-cancel" id="modalCancelBtn">ยกเลิก</button>
  </div>
</div>

<!-- แถบอักษรวิ่งด้านล่าง (ตั้งค่าได้ใน q-setting.html) -->
<div class="mq-bar" id="marqueeBar">
  <div class="mq-content" id="marqueeContent"></div>
</div>

<!-- Supabase UMD + non-module init -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/supabase-compat.js"></script>

<script>
(function () {
  'use strict';

  function showFatalError(msg, detail) {
    var grid = document.getElementById('grid');
    if (!grid) return;
    grid.innerHTML =
      '<div class="empty error">' +
        '<div class="empty-icon">❌</div>' +
        '<div class="empty-text">' + msg + '</div>' +
        (detail ? '<div class="empty-detail">' + detail + '</div>' : '') +
      '</div>';
  }

  window.onerror = function (msg, src, line) {
    showFatalError('เกิดข้อผิดพลาด', msg + ' (บรรทัด ' + line + ')');
  };

  var supabase = window.supabaseClient;
  if (!supabase) {
    showFatalError(
      'เชื่อมต่อ Supabase ไม่ได้',
      'กรุณาตรวจสอบไฟล์ js/supabase-compat.js ว่ามี URL และ ANON KEY ที่ถูกต้อง'
    );
    return;
  }

  // ─── State ───
  var isTvMode = false;
  try { isTvMode = (location.search || '').indexOf('tv=1') !== -1; } catch (e) {}
  if (isTvMode) document.body.className += ' tv-mode';

  var allVoices = [];
  var audioCtx = null;
  var audioUnlocked = false;
  var waitingQueues = [];
  var currentCallTimer = null;
  var selectedQueue = null;

  function safe(obj, path) {
    if (!obj) return null;
    var parts = path.split('.');
    var cur = obj;
    for (var i = 0; i < parts.length; i++) {
      if (cur == null) return null;
      cur = cur[parts[i]];
    }
    return cur == null ? null : cur;
  }

  function getSettings() {
    var rooms;
    try {
      rooms = JSON.parse(localStorage.getItem('q_rooms') || '["ห้องตรวจ 1","ห้องตรวจ 2"]');
    } catch (e) {
      rooms = ['ห้องตรวจ 1', 'ห้องตรวจ 2'];
    }
    return {
      rooms: rooms,
      voiceName: localStorage.getItem('q_voice_name') || '',
      rate: parseFloat(localStorage.getItem('q_speech_rate') || '1.0'),
      pitch: parseFloat(localStorage.getItem('q_speech_pitch') || '1.0'),
      repeat: parseInt(localStorage.getItem('q_repeat') || '2', 10)
    };
  }

  function updateClock() {
    var now = new Date();
    var h = now.getHours(); var m = now.getMinutes();
    var txt = (h < 10 ? '0' + h : h) + ':' + (m < 10 ? '0' + m : m);
    var el = document.getElementById('clock');
    if (el) el.textContent = txt;
  }
  setInterval(updateClock, 1000); updateClock();

  // ─── Audio unlock (สำหรับ chime + Web Speech) ───
  function ensureAudio() {
    return new Promise(function (resolve) {
      if (!audioCtx) {
        try {
          var Ctx = window.AudioContext || window.webkitAudioContext;
          if (Ctx) audioCtx = new Ctx();
        } catch (e) { resolve(null); return; }
      }
      if (audioCtx && audioCtx.state === 'suspended') {
        try {
          audioCtx.resume().then(function () { resolve(audioCtx); }, function () { resolve(audioCtx); });
        } catch (e) { resolve(audioCtx); }
      } else {
        resolve(audioCtx);
      }
    });
  }

  function unlockAudio() {
    ensureAudio().then(function (ctx) {
      if (ctx && ctx.state === 'running') {
        audioUnlocked = true;
        var el = document.getElementById('audioPrompt');
        if (el) el.className = el.className.replace(' show', '');
        try {
          var o = ctx.createOscillator(); var g = ctx.createGain();
          g.gain.value = 0.01; o.connect(g).connect(ctx.destination);
          o.frequency.value = 440; o.start(); o.stop(ctx.currentTime + 0.05);
        } catch (e) {}
        try {
          if (window.speechSynthesis) {
            var test = new SpeechSynthesisUtterance(' ');
            test.volume = 0; window.speechSynthesis.speak(test);
          }
        } catch (e) {}
      }
    });
  }
  document.getElementById('audioPrompt').onclick = unlockAudio;

  document.addEventListener('click', function () {
    if (!audioUnlocked) {
      ensureAudio().then(function () {
        if (audioCtx && audioCtx.state === 'running') {
          audioUnlocked = true;
          var el = document.getElementById('audioPrompt');
          if (el) el.className = el.className.replace(' show', '');
        }
      });
    }
  });

  setTimeout(function () {
    if (!audioUnlocked) {
      var el = document.getElementById('audioPrompt');
      if (el && el.className.indexOf('show') === -1) el.className += ' show';
    }
  }, 1500);

  function playChime() {
    if (!audioCtx || audioCtx.state !== 'running') return;
    var t = audioCtx.currentTime;
    var notes = [{ f: 880, d: 0 }, { f: 660, d: 0.35 }];
    for (var i = 0; i < notes.length; i++) {
      (function (note) {
        try {
          var o = audioCtx.createOscillator(); var g = audioCtx.createGain();
          o.connect(g).connect(audioCtx.destination);
          o.frequency.value = note.f; o.type = 'sine';
          g.gain.setValueAtTime(0, t + note.d);
          g.gain.linearRampToValueAtTime(0.35, t + note.d + 0.05);
          g.gain.exponentialRampToValueAtTime(0.001, t + note.d + 0.5);
          o.start(t + note.d); o.stop(t + note.d + 0.5);
        } catch (e) {}
      })(notes[i]);
    }
  }

  // ─── Number → Thai ───
  function numberToThai(n) {
    if (n == null) return '';
    n = parseInt(n, 10);
    if (isNaN(n)) return '';
    var d = ['ศูนย์','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'];
    if (n === 0) return d[0];
    if (n < 0) return 'ลบ ' + numberToThai(-n);
    if (n < 10) return d[n];
    if (n === 10) return 'สิบ';
    if (n < 20) return n === 11 ? 'สิบเอ็ด' : 'สิบ' + d[n - 10];
    if (n < 100) {
      var t = Math.floor(n / 10), o = n % 10;
      var tens = t === 2 ? 'ยี่สิบ' : d[t] + 'สิบ';
      if (o === 0) return tens;
      if (o === 1) return tens + 'เอ็ด';
      return tens + d[o];
    }
    if (n < 1000) {
      var h = Math.floor(n / 100), r = n % 100;
      return d[h] + 'ร้อย' + (r === 0 ? '' : numberToThai(r));
    }
    var out = [];
    var s = String(n);
    for (var i = 0; i < s.length; i++) out.push(d[+s.charAt(i)]);
    return out.join(' ');
  }

  // ─── Voices ───
  function loadVoices() {
    if (window.speechSynthesis) allVoices = window.speechSynthesis.getVoices() || [];
  }
  loadVoices();
  if (window.speechSynthesis && typeof window.speechSynthesis.onvoiceschanged !== 'undefined') {
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }

  function findVoice(name) {
    if (!name || !allVoices) return null;
    for (var i = 0; i < allVoices.length; i++) {
      if (allVoices[i].name === name) return allVoices[i];
    }
    return null;
  }

  // ─── Speak (Web Speech API only) ───
  function speakCall(queueNumber, animalName, ownerName, roomName, times) {
    if (!window.speechSynthesis) return;
    times = times || 2;
    window.speechSynthesis.cancel();
    var s = getSettings();
    var voice = findVoice(s.voiceName);
    var thaiNum = numberToThai(queueNumber);
    var text = 'ขอเชิญคิวหมายเลข ' + thaiNum +
               ' คุณ' + (ownerName || '') +
               ' เจ้าของน้อง' + (animalName || '') +
               ' เข้า' + (roomName || '');

    function speakOnce() {
      return new Promise(function (resolve) {
        var u = new SpeechSynthesisUtterance(text);
        u.lang = 'th-TH';
        u.rate = s.rate;
        u.pitch = s.pitch;
        if (voice) u.voice = voice;
        var safety = setTimeout(resolve, 30000);
        u.onend = function () { clearTimeout(safety); resolve(); };
        u.onerror = u.onend;
        window.speechSynthesis.speak(u);
      });
    }

    (function loop(i) {
      if (i >= times) return;
      speakOnce().then(function () {
        if (i < times - 1) setTimeout(function () { loop(i + 1); }, 700);
      });
    })(0);
  }

  // ─── Helpers ───
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function firstName(fullName) {
    if (!fullName) return '';
    var p = fullName.split(/\s+/)[0];
    return p.replace(/^(นาย|นาง|นางสาว|น\.ส\.|ด\.ช\.|ด\.ญ\.)/, '');
  }
  function speciesIcon(s) {
    if (s === 'ส') return '🐶';
    if (s === 'ม') return '🐱';
    return '🐾';
  }
  function adaptiveSize(count) {
    if (count <= 6) return 'lg';
    if (count <= 16) return 'md';
    if (count <= 32) return 'sm';
    return 'xs';
  }

  // ─── Render ───
  function renderRoomBar() {
    var s = getSettings();
    var bar = document.getElementById('roomBar');
    if (!bar) return;
    if (isTvMode) { bar.style.display = 'none'; return; }
    var html = '';
    for (var i = 0; i < s.rooms.length; i++) {
      var r = s.rooms[i];
      html += '<button class="room-btn" data-room="' + escapeHtml(r) + '">' +
                '📢 เรียกถัดไป → ' + escapeHtml(r) +
              '</button>';
    }
    bar.innerHTML = html;
    var btns = bar.querySelectorAll('.room-btn');
    for (var j = 0; j < btns.length; j++) {
      btns[j].onclick = (function (room) {
        return function () { callNext(room); };
      })(btns[j].getAttribute('data-room'));
    }
  }

  function renderGrid() {
    var grid = document.getElementById('grid');
    var countEl = document.getElementById('waitingCount');
    if (countEl) countEl.textContent = waitingQueues.length;
    if (!grid) return;

    if (waitingQueues.length === 0) {
      grid.innerHTML = '<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">ไม่มีคิวรอตรวจ</div></div>';
      return;
    }
    grid.setAttribute('data-size', adaptiveSize(waitingQueues.length));

    var html = '';
    for (var i = 0; i < waitingQueues.length; i++) {
      var q = waitingQueues[i];
      var a = q.vasd_animal;
      if (!a) continue;
      var owner = safe(a, 'vasd_owner.owner_name') || '';
      html += '<div class="q-card" data-animal-id="' + escapeHtml(a.id) + '">' +
                '<div class="q-num">' + (a.queue_number || '-') + '</div>' +
                '<div class="q-name">' + speciesIcon(a.species) + ' ' + escapeHtml(a.animal_name) + '</div>' +
                '<div class="q-owner">' + escapeHtml(firstName(owner)) + '</div>' +
              '</div>';
    }
    grid.innerHTML = html;

    var cards = grid.querySelectorAll('.q-card');
    for (var k = 0; k < cards.length; k++) {
      cards[k].onclick = (function (id) {
        return function () { openCallModal(id); };
      })(cards[k].getAttribute('data-animal-id'));
    }
  }

  // ─── Load Waiting ───
  function loadWaiting() {
    var timeoutFired = false;
    var timer = setTimeout(function () {
      timeoutFired = true;
      showFatalError(
        'ตอบสนองช้าเกินไป',
        'การโหลดคิวจาก Supabase ใช้เวลานานเกิน 15 วินาที กรุณาตรวจสอบ network'
      );
    }, 15000);

    try {
      var query = supabase
        .from('vasd_queue')
        .select('id, animal_id, status, vasd_animal(id, queue_number, animal_name, species, sex, vasd_owner(owner_name))')
        .eq('status', 'waiting');

      query.then(function (res) {
        clearTimeout(timer);
        if (timeoutFired) return;

        if (res && res.error) {
          console.error('[Q] load failed', res.error);
          showFatalError('โหลดข้อมูลไม่สำเร็จ', res.error.message || String(res.error));
          return;
        }
        var data = (res && res.data) ? res.data : [];
        var filtered = [];
        for (var i = 0; i < data.length; i++) {
          if (data[i].vasd_animal) filtered.push(data[i]);
        }
        filtered.sort(function (a, b) {
          var qa = (a.vasd_animal && a.vasd_animal.queue_number) || 999;
          var qb = (b.vasd_animal && b.vasd_animal.queue_number) || 999;
          return qa - qb;
        });
        waitingQueues = filtered;
        renderGrid();
      }, function (err) {
        clearTimeout(timer);
        if (timeoutFired) return;
        console.error('[Q] load failed', err);
        showFatalError('โหลดข้อมูลไม่สำเร็จ', (err && err.message) || String(err));
      });
    } catch (e) {
      clearTimeout(timer);
      console.error('[Q] exception', e);
      showFatalError('เกิดข้อผิดพลาด', e.message || String(e));
    }
  }

  // ─── Call System ───
  var callChannel = supabase.channel('vasd-queue-call', {
    config: { broadcast: { self: true } }
  });

  callChannel
    .on('broadcast', { event: 'call' }, function (payload) {
      console.log('[Q] received call', payload);
      showCallHero(payload.payload);
    })
    .subscribe();

  function callNext(roomName) {
    if (waitingQueues.length === 0) { alert('ไม่มีคิวรอตรวจ'); return; }
    broadcastCall(waitingQueues[0], roomName);
  }

  function openCallModal(animalId) {
    var q = null;
    for (var i = 0; i < waitingQueues.length; i++) {
      if (waitingQueues[i].vasd_animal && waitingQueues[i].vasd_animal.id === animalId) {
        q = waitingQueues[i]; break;
      }
    }
    if (!q) return;
    selectedQueue = q;
    var a = q.vasd_animal;
    var owner = safe(a, 'vasd_owner.owner_name') || '';
    document.getElementById('modalQNum').textContent = a.queue_number || '-';
    document.getElementById('modalTitle').textContent = speciesIcon(a.species) + ' ' + a.animal_name;
    document.getElementById('modalSubtitle').textContent = firstName(owner) + ' — เลือกห้องที่จะเรียก';

    var s = getSettings();
    var html = '';
    for (var j = 0; j < s.rooms.length; j++) {
      html += '<button class="modal-room-btn" data-room="' + escapeHtml(s.rooms[j]) + '">' +
                escapeHtml(s.rooms[j]) +
              '</button>';
    }
    var roomsBox = document.getElementById('modalRooms');
    roomsBox.innerHTML = html;
    var btns = roomsBox.querySelectorAll('.modal-room-btn');
    for (var k = 0; k < btns.length; k++) {
      btns[k].onclick = (function (room) {
        return function () { confirmCall(room); };
      })(btns[k].getAttribute('data-room'));
    }
    document.getElementById('callModal').className = 'modal-overlay show';
  }

  function confirmCall(roomName) {
    if (!selectedQueue) return;
    broadcastCall(selectedQueue, roomName);
    closeModal();
  }

  function closeModal() {
    document.getElementById('callModal').className = 'modal-overlay';
    selectedQueue = null;
  }

  document.getElementById('modalCancelBtn').onclick = function () { closeModal(); };
  document.getElementById('callModal').onclick = function (ev) {
    if (ev.target.id === 'callModal') closeModal();
  };

  function broadcastCall(queue, roomName) {
    var a = queue.vasd_animal;
    var owner = safe(a, 'vasd_owner.owner_name') || '';
    var payload = {
      callId: Date.now() + '-' + Math.random().toString(36).slice(2, 7),
      queueNumber: a.queue_number,
      animalName: a.animal_name,
      ownerName: firstName(owner),
      species: a.species,
      roomName: roomName,
      timestamp: new Date().toISOString()
    };
    try {
      var sendResult = callChannel.send({ type: 'broadcast', event: 'call', payload: payload });
      if (sendResult && typeof sendResult.then === 'function') {
        sendResult.then(null, function (e) {
          alert('ส่งสัญญาณไม่สำเร็จ: ' + ((e && e.message) || e));
        });
      }
      var card = document.querySelector('.q-card[data-animal-id="' + a.id + '"]');
      if (card) {
        card.className += ' calling';
        setTimeout(function () {
          card.className = card.className.replace(' calling', '');
        }, 30000);
      }
    } catch (e) {
      alert('ส่งสัญญาณไม่สำเร็จ: ' + (e.message || e));
    }
  }

  function showCallHero(call) {
    var hero = document.getElementById('callHero');
    document.getElementById('callNum').textContent = call.queueNumber || '—';
    document.getElementById('callAnimal').textContent = speciesIcon(call.species) + ' ' + (call.animalName || '—');
    document.getElementById('callOwner').textContent = call.ownerName ? ('คุณ ' + call.ownerName) : '';
    document.getElementById('callRoomName').textContent = call.roomName || '—';
    hero.className = 'call-hero show';
    try { window.scrollTo({ top: 0, behavior: 'smooth' }); }
    catch (e) { window.scrollTo(0, 0); }

    playChime();
    var s = getSettings();
    setTimeout(function () {
      speakCall(call.queueNumber, call.animalName, call.ownerName, call.roomName, s.repeat);
    }, 800);

    if (currentCallTimer) clearTimeout(currentCallTimer);
    currentCallTimer = setTimeout(function () {
      hero.className = 'call-hero';
    }, 30000);
  }

  // ─── Realtime updates ───
  try {
    supabase.channel('q-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'vasd_queue' }, loadWaiting)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'vasd_animal' }, loadWaiting)
      .subscribe();
  } catch (e) {
    console.warn('[Q] realtime subscribe failed:', e);
  }

  // ─── Start ───
  renderRoomBar();
  loadWaiting();
  setInterval(loadWaiting, 15000);

  // ─── Marquee Bar (อ่านค่าจาก localStorage ที่ตั้งจาก q-setting.html) ───
  function loadMarqueeSettings() {
    return {
      enabled:   localStorage.getItem('q_marquee_enabled') !== 'false',
      text:      localStorage.getItem('q_marquee_text') || '',
      font:      localStorage.getItem('q_marquee_font') || 'Sarabun',
      color:     localStorage.getItem('q_marquee_color') || '#14c4bc',
      bgColor:   localStorage.getItem('q_marquee_bg_color') || '#0b1929',
      size:      parseInt(localStorage.getItem('q_marquee_size') || '28', 10),
      speed:     parseFloat(localStorage.getItem('q_marquee_speed') || '20'),
      animation: localStorage.getItem('q_marquee_animation') || 'scroll'
    };
  }

  function applyMarquee() {
    var bar = document.getElementById('marqueeBar');
    var content = document.getElementById('marqueeContent');
    if (!bar || !content) return;
    var s = loadMarqueeSettings();

    if (!s.enabled || !s.text || !s.text.trim()) {
      bar.className = 'mq-bar';
      document.body.style.paddingBottom = '';
      return;
    }

    bar.className = 'mq-bar show';
    bar.style.background = s.bgColor;
    bar.style.setProperty('--mq-speed', s.speed + 's');

    content.textContent = s.text;
    content.style.fontFamily = '"' + s.font + '", "Sarabun", sans-serif';
    content.style.color = s.color;
    content.style.fontSize = s.size + 'px';
    content.style.fontWeight = '700';

    // class สำหรับ animation
    var cls = 'mq-content';
    if (s.animation === 'scroll')          cls += ' scroll';
    else if (s.animation === 'scroll-reverse') cls += ' scroll reverse';
    else if (s.animation === 'none')       cls += ' fixed';
    else                                   cls += ' fixed ' + s.animation;
    content.className = cls;

    // ปรับ padding-bottom ของ body เพื่อไม่ให้ marquee ทับเนื้อหา
    setTimeout(function () {
      document.body.style.paddingBottom = bar.offsetHeight + 'px';
    }, 50);
  }

  // listen change ข้าม tab (ถ้าตั้งใน q-setting.html อีกแท็บ จะ refresh ทันที)
  window.addEventListener('storage', function (e) {
    if (e.key && e.key.indexOf('q_marquee_') === 0) applyMarquee();
  });

  applyMarquee();
  // re-apply เมื่อ window resize เผื่อ padding คำนวณใหม่
  window.addEventListener('resize', function () {
    setTimeout(applyMarquee, 100);
  });

  // debug helper
  window.__q = {
    reload: loadWaiting,
    waitingQueues: function () { return waitingQueues; },
    callNext: callNext,
    refreshMarquee: applyMarquee
  };
})();
</script>

</body>
